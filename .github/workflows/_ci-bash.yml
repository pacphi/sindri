name: _ci-bash

# Reusable callable for Bash/Shell CI (used by ci-v2.yml).
# Runs shellcheck + bats tests across configurable paths.

on:
  workflow_call:
    inputs:
      shellcheck_paths:
        description: Glob(s) for shellcheck (space-separated)
        required: false
        default: 'v2/**/*.sh v2/**/*.bash'
        type: string
      bats_dir:
        description: Directory with bats test files
        required: false
        default: 'v2/test'
        type: string

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          files=$(find ${{ inputs.shellcheck_paths }} -type f 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No shell files matched ${{ inputs.shellcheck_paths }}"; exit 0
          fi
          echo "$files" | xargs shellcheck --rcfile=.shellcheckrc

  bats:
    name: bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats
        run: |
          if [ -d "${{ inputs.bats_dir }}" ]; then
            bats -r "${{ inputs.bats_dir }}"
          else
            echo "No ${{ inputs.bats_dir }} directory; skipping"
          fi
