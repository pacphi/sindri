name: _ci-docker

# Reusable callable for building and validating a Docker image without pushing.

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile (relative to repo root)
        required: true
        type: string
      context:
        description: Build context directory
        required: false
        default: '.'
        type: string
      image_tag:
        description: Local tag for the built image (validation only; not pushed)
        required: false
        default: 'sindri:ci'
        type: string

permissions:
  contents: read

jobs:
  build:
    name: docker build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          tags: ${{ inputs.image_tag }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: docker image inspect "${{ inputs.image_tag }}" >/dev/null
