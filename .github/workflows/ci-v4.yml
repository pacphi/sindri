name: "v4: CI"

# v4 (Rust, redesigned) — promoted from research/v4 during April 2026 reorg.
# This workflow lives on `main` and triggers only on push/PR to the `v4` branch.
# Cross-platform matrix preserved from research/v4:.github/workflows/ci.yml.

on:
  push:
    branches: [v4]
  pull_request:
    branches: [v4]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-v4-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  tier: 1 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, tier: 1 }
          - { os: macos-14,         target: aarch64-apple-darwin,      tier: 1 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    tier: 1 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v4/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('v4/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build workspace
        working-directory: v4
        run: cargo build --release --workspace
      - name: Run tests
        working-directory: v4
        run: cargo test --workspace
      - name: Clippy (no warnings)
        working-directory: v4
        run: cargo clippy --workspace -- -D warnings
      - name: Smoke install test (local registry)
        working-directory: v4
        shell: bash
        run: |
          cp target/release/sindri* /tmp/ 2>/dev/null || cp target/release/sindri /tmp/ 2>/dev/null || true
          /tmp/sindri registry refresh core "registry:local:registry-core"
          /tmp/sindri ls
          /tmp/sindri validate /dev/null 2>/dev/null || true  # exits 4 as expected

  build-windows-arm:
    name: Build Windows ARM64 (Tier 2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-pc-windows-msvc }
      - name: Cross-compile (build only)
        working-directory: v4
        run: cargo build --target aarch64-pc-windows-msvc --workspace

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        working-directory: v4
        run: cargo audit
