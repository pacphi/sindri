name: "v2: CI (shim)"

# This file exists ONLY so GitHub triggers the centralized ci-v2.yml
# workflow that lives on the main branch. The actual CI logic is on main —
# changes to it should be made there, not here.

on:
  push:
    branches: [v2]
    paths:
      - 'v2/**'
      - '.github/workflows/ci.yml'
      - '.dockerignore'
      - '.shellcheckrc'
      - '.yamllint.yml'
      - 'Makefile'
  pull_request:
    branches: [v2]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'RELEASE_NOTES*.md'
      - '**/*.md'
  workflow_dispatch:

# Permissions must be a SUPERSET of every nested permission the called
# workflow (and its callees) requires. Reusable workflows cannot exceed
# the caller's grant. Keep this list up to date when ci-v2.yml gains new
# permissions.
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  pull-requests: write
  issues: write
  security-events: write
  actions: read
  checks: write
  deployments: write
  statuses: write

jobs:
  ci:
    name: CI
    uses: pacphi/sindri/.github/workflows/ci-v2.yml@main
    secrets: inherit
