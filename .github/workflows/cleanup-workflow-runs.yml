name: Cleanup Workflow Runs

# Branch-aware cleanup applied uniformly to every branch.
#
# Deletion rules (same rule across all branches):
#   1. Orphan-workflow runs (workflow YAML no longer present in the default
#      branch's .github/workflows) are deleted past the orphan grace period.
#   2. Orphan-branch runs (head branch no longer exists on the remote) are
#      deleted past the orphan grace period.
#   3. Live runs older than RETENTION_DAYS are deleted, EXCEPT we always keep
#      the most recent KEEP_LAST_N successful runs per (workflow, branch).
#
# In-progress / queued runs are never touched.

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

  workflow_dispatch:
    inputs:
      days:
        description: Delete completed runs older than N days
        required: true
        default: "7"
        type: string
      keep-last:
        description: Always keep the last N successful runs per workflow per branch
        required: true
        default: "3"
        type: string
      orphan-grace-days:
        description: Grace period (days) before deleting runs from deleted branches/workflows
        required: true
        default: "1"
        type: string
      dry-run:
        description: Show what would be deleted without deleting
        required: false
        default: false
        type: boolean

env:
  RETENTION_DAYS: ${{ inputs.days || '7' }}
  KEEP_LAST_N: ${{ inputs.keep-last || '3' }}
  ORPHAN_GRACE_DAYS: ${{ inputs.orphan-grace-days || '1' }}
  DRY_RUN: ${{ inputs.dry-run || 'false' }}

jobs:
  cleanup:
    name: Delete Old Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Plan deletions
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys
          from collections import defaultdict
          from datetime import datetime, timedelta, timezone

          repo = os.environ["REPO"]
          retention = int(os.environ["RETENTION_DAYS"])
          keep_n = int(os.environ["KEEP_LAST_N"])
          grace = int(os.environ["ORPHAN_GRACE_DAYS"])
          now = datetime.now(timezone.utc)
          age_cutoff = now - timedelta(days=retention)
          orphan_cutoff = now - timedelta(days=grace)

          def gh(*args):
              out = subprocess.check_output(["gh", "api", "--paginate", *args], text=True)
              # --paginate concatenates JSON arrays; for object-returning endpoints
              # we have to handle list-of-objects separately. Callers pass --jq.
              return out

          # Live branches
          branches_raw = gh(f"repos/{repo}/branches", "--jq", ".[].name")
          live_branches = {b for b in branches_raw.splitlines() if b}

          # Active workflow file paths (basename only, e.g. "ci-v3.yml")
          wf_raw = gh(f"repos/{repo}/actions/workflows", "--jq", ".workflows[] | {id, path, state}")
          active_wf_ids = set()
          wf_name_by_id = {}
          for line in wf_raw.splitlines():
              if not line.strip():
                  continue
              wf = json.loads(line)
              wf_name_by_id[wf["id"]] = wf["path"].rsplit("/", 1)[-1]
              if wf["state"] == "active":
                  active_wf_ids.add(wf["id"])

          # All completed runs
          runs_raw = gh(
              f"repos/{repo}/actions/runs",
              "--jq",
              '.workflow_runs[] | select(.status=="completed") | '
              '{id, workflow_id, head_branch, conclusion, updated_at, name}',
          )
          runs = [json.loads(l) for l in runs_raw.splitlines() if l.strip()]

          # Group successful runs per (workflow_id, branch) sorted newest-first
          # so we can protect the last N.
          successes = defaultdict(list)
          for r in runs:
              if r["conclusion"] == "success":
                  successes[(r["workflow_id"], r["head_branch"])].append(r)
          for k in successes:
              successes[k].sort(key=lambda x: x["updated_at"], reverse=True)
          protected_ids = set()
          for k, lst in successes.items():
              for r in lst[:keep_n]:
                  protected_ids.add(r["id"])

          to_delete = []  # list of (run, reason)
          kept = []
          for r in runs:
              updated = datetime.fromisoformat(r["updated_at"].replace("Z", "+00:00"))
              wf_active = r["workflow_id"] in active_wf_ids
              branch_live = r["head_branch"] in live_branches if r["head_branch"] else False

              if not wf_active and updated < orphan_cutoff:
                  to_delete.append((r, "orphan-workflow"))
              elif not branch_live and updated < orphan_cutoff:
                  to_delete.append((r, "orphan-branch"))
              elif updated < age_cutoff:
                  if r["id"] in protected_ids:
                      kept.append((r, "keep-last-N"))
                  else:
                      to_delete.append((r, "age"))
              else:
                  kept.append((r, "fresh"))

          # Persist plan
          with open("plan.json", "w") as f:
              json.dump(
                  {
                      "delete": [{"id": r["id"], "reason": why, "branch": r["head_branch"],
                                  "workflow": wf_name_by_id.get(r["workflow_id"], r["name"]),
                                  "conclusion": r["conclusion"], "updated_at": r["updated_at"]}
                                 for r, why in to_delete],
                      "kept_count": len(kept),
                  },
                  f,
              )

          # Summaries
          by_branch = defaultdict(int)
          by_workflow = defaultdict(int)
          by_reason = defaultdict(int)
          for r, why in to_delete:
              by_branch[r["head_branch"] or "(none)"] += 1
              by_workflow[wf_name_by_id.get(r["workflow_id"], r["name"])] += 1
              by_reason[why] += 1

          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "a") as s:
              s.write("# Workflow Run Cleanup Plan\n\n")
              s.write(f"- Retention: **{retention} days**\n")
              s.write(f"- Keep-last-N successful per (workflow, branch): **{keep_n}**\n")
              s.write(f"- Orphan grace: **{grace} days**\n")
              s.write(f"- Dry run: **{os.environ['DRY_RUN']}**\n")
              s.write(f"- Live branches: **{len(live_branches)}**\n")
              s.write(f"- Active workflows: **{len(active_wf_ids)}**\n")
              s.write(f"- Total completed runs scanned: **{len(runs)}**\n")
              s.write(f"- Runs to delete: **{len(to_delete)}**\n")
              s.write(f"- Runs kept: **{len(kept)}**\n\n")

              s.write("## Deletions by reason\n\n| Reason | Count |\n|---|---:|\n")
              for k, v in sorted(by_reason.items(), key=lambda x: -x[1]):
                  s.write(f"| {k} | {v} |\n")

              s.write("\n## Deletions by branch (top 25)\n\n| Branch | Runs |\n|---|---:|\n")
              for k, v in sorted(by_branch.items(), key=lambda x: -x[1])[:25]:
                  s.write(f"| `{k}` | {v} |\n")

              s.write("\n## Deletions by workflow (top 25)\n\n| Workflow | Runs |\n|---|---:|\n")
              for k, v in sorted(by_workflow.items(), key=lambda x: -x[1])[:25]:
                  s.write(f"| `{k}` | {v} |\n")

          print(f"::notice::Planned {len(to_delete)} deletions across {len(by_branch)} branches")

          with open(os.environ["GITHUB_OUTPUT"], "a") as o:
              o.write(f"count={len(to_delete)}\n")
          PY

      - name: Dry-run preview
        if: env.DRY_RUN == 'true' && steps.plan.outputs.count != '0'
        run: |
          echo "DRY RUN — first 30 planned deletions:"
          jq -r '.delete[] | "\(.reason)\t\(.branch)\t\(.workflow)\t\(.id)\t\(.updated_at)"' plan.json | head -30
          echo "..."
          echo "(see step summary for full breakdown)"

      - name: Delete workflow runs
        if: env.DRY_RUN != 'true' && steps.plan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          DELETED=0
          FAILED=0
          while read -r RUN_ID; do
            [[ -z "$RUN_ID" ]] && continue
            if gh api "repos/${REPO}/actions/runs/${RUN_ID}" -X DELETE >/dev/null 2>&1; then
              DELETED=$((DELETED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "::warning::Failed to delete run $RUN_ID"
            fi
          done < <(jq -r '.delete[].id' plan.json)
          echo "Deleted: $DELETED, failed: $FAILED"
          {
            echo ""
            echo "## Deletion result"
            echo ""
            echo "- Deleted: **$DELETED**"
            echo "- Failed: **$FAILED**"
          } >> "$GITHUB_STEP_SUMMARY"
