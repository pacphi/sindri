name: "v4: Release"

# v4 Rust binary release pipeline.
# Triggers on tags matching v4.*.* (e.g., v4.0.0, v4.0.0-alpha.1).

on:
  push:
    tags:
      - "v4.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
    steps:
      - name: Validate semantic version tag
        id: validate
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v4\.[0-9]+\.[0-9]+(-[a-zA-Z0-9.-]+)?$ ]]; then
            echo "::error::Invalid v4 tag: $tag"
            exit 1
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build v4 release artifacts
    needs: validate-tag
    uses: ./.github/workflows/_release-cargo-dist.yml
    with:
      workspace_dir: v4
      version: ${{ needs.validate-tag.outputs.version }}

  publish:
    name: Publish GitHub Release
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { ref: v4 }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v4 ${{ needs.validate-tag.outputs.version }}"
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          body_path: v4/RELEASE_NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: false
