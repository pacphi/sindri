# V3 Pre-Release Extension Testing
# Comprehensive extension validation using CI release candidate images before tagging
name: "v3: Pre-Release Tests"

on:
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Commit SHA to test (leave empty for latest main)'
        required: false
        type: string
        default: ''

      providers:
        description: 'Providers to test (comma-separated)'
        required: false
        type: string
        default: 'docker,k3d,fly'

      filter-heavy:
        description: 'Exclude heavy extensions (>4GB memory, >10min install)'
        required: false
        type: boolean
        default: false  # Pre-release: test everything by default

      distros:
        description: 'Distros to test (comma-separated: ubuntu,fedora,opensuse)'
        required: false
        type: string
        default: 'ubuntu,fedora,opensuse'

      max-parallel:
        description: 'Maximum parallel jobs per provider'
        required: false
        type: string
        default: '2'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # Resolve commit SHA and find CI release candidate images for each distro
  resolve-ci-images:
    name: Resolve CI Release Candidates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      commit_sha: ${{ steps.resolve-sha.outputs.sha }}
      short_sha: ${{ steps.resolve-sha.outputs.short_sha }}
      distros_tested: ${{ steps.build-matrix.outputs.distros_tested }}
      distro_summary: ${{ steps.build-matrix.outputs.distro_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve commit SHA
        id: resolve-sha
        run: |
          if [[ -n "${{ inputs.commit-sha }}" ]]; then
            SHA="${{ inputs.commit-sha }}"
            echo "Using provided SHA: $SHA"
          else
            SHA=$(git rev-parse origin/main)
            echo "Using latest main SHA: $SHA"
          fi

          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distro matrix
        id: build-matrix
        run: |
          SHA="${{ steps.resolve-sha.outputs.sha }}"
          DISTROS="${{ inputs.distros || 'ubuntu,fedora,opensuse' }}"
          REPO="${{ github.repository }}"

          echo "Resolving CI images for distros: $DISTROS"
          echo ""

          INCLUDE="[]"
          SUMMARY="[]"
          FAILED=false

          for DISTRO in $(echo "$DISTROS" | tr ',' ' '); do
            CI_PASSED="ghcr.io/${REPO}:v3-ci-passed-${SHA}-${DISTRO}"
            CI_TAG="ghcr.io/${REPO}:v3-ci-${SHA}-${DISTRO}"

            echo "── ${DISTRO} ──"
            echo "  Preferred: $CI_PASSED (tested)"
            echo "  Fallback:  $CI_TAG (untested)"

            if docker pull "$CI_PASSED" 2>/dev/null; then
              echo "  ✅ Found tested CI image"
              INCLUDE=$(echo "$INCLUDE" | jq \
                --arg d "$DISTRO" --arg img "$CI_PASSED" --arg src "ci-passed" \
                '. + [{distro: $d, ci_image: $img, image_source: $src}]')
              SUMMARY=$(echo "$SUMMARY" | jq \
                --arg d "$DISTRO" --arg src "ci-passed" \
                '. + [{distro: $d, status: "✅ Passed CI Tests", source: $src}]')
            elif docker pull "$CI_TAG" 2>/dev/null; then
              echo "  ⚠️  Using untested CI image"
              echo "::warning title=Untested Candidate ($DISTRO)::Using CI image that didn't pass full test suite for $DISTRO"
              INCLUDE=$(echo "$INCLUDE" | jq \
                --arg d "$DISTRO" --arg img "$CI_TAG" --arg src "ci-tag" \
                '. + [{distro: $d, ci_image: $img, image_source: $src}]')
              SUMMARY=$(echo "$SUMMARY" | jq \
                --arg d "$DISTRO" --arg src "ci-tag" \
                '. + [{distro: $d, status: "⚠️ Untested", source: $src}]')
            else
              echo "  ❌ No CI image found"
              echo "::error title=No CI Image ($DISTRO)::No CI release candidate found for $DISTRO at commit $SHA"
              FAILED=true
            fi
            echo ""
          done

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "Possible causes:"
            echo "  1. CI workflow hasn't run on this commit yet"
            echo "  2. CI workflow is still running"
            echo "  3. CI workflow failed to build image"
            echo "  4. Image was deleted (retention policy)"
            echo ""
            echo "Solutions:"
            echo "  1. Wait for CI to complete"
            echo "  2. Run CI workflow manually on this commit"
            echo "  3. Provide a different commit SHA"
            echo "  4. Reduce the distros list to only available ones"
            exit 1
          fi

          MATRIX=$(jq -nc --argjson include "$INCLUDE" '{"include": $include}')
          DISTROS_TESTED=$(echo "$INCLUDE" | jq -c '[.[].distro]')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "distros_tested=$DISTROS_TESTED" >> $GITHUB_OUTPUT

          {
            echo "distro_summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "Resolved $(echo "$INCLUDE" | jq 'length') distro(s): $DISTROS_TESTED"

  # Test individual extensions per distro using the CI images
  test-extensions:
    name: Test Extensions — ${{ matrix.distro }}
    needs: resolve-ci-images
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-ci-images.outputs.matrix) }}
    uses: ./.github/workflows/v3-extension-test.yml
    with:
      # CRITICAL: Test ALL extensions individually (not profiles)
      selection-mode: all

      # Use distro-specific CI image as base for all provider tests
      sindri-image: ${{ matrix.ci_image }}

      providers: ${{ inputs.providers }}
      max-parallel: ${{ fromJSON(inputs.max-parallel || '2') }}
      filter-heavy: ${{ inputs.filter-heavy }}
    secrets: inherit

  # Generate comprehensive test report
  summary:
    name: Pre-Release Summary
    needs: [resolve-ci-images, test-extensions]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary
        env:
          DISTRO_SUMMARY: ${{ needs.resolve-ci-images.outputs.distro_summary }}
        run: |
          echo "# V3 Pre-Release Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | \`${{ needs.resolve-ci-images.outputs.commit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Short SHA** | \`${{ needs.resolve-ci-images.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Distros** | ${{ needs.resolve-ci-images.outputs.distros_tested }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Providers** | ${{ inputs.providers }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Filter Heavy** | ${{ inputs.filter-heavy }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Max Parallel** | ${{ inputs.max-parallel }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Release Candidates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Distro | CI Image Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "$DISTRO_SUMMARY" | jq -r '.[] | "| **\(.distro)** | \(.status) |"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test-extensions.result }}" == "success" ]]; then
            echo "### ✅ All Extension Tests Passed (All Distros)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All individual extensions passed testing across all selected distros and providers." >> $GITHUB_STEP_SUMMARY
            echo "This commit is ready for release tagging." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Extension Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some extensions failed testing on one or more distros. Review per-distro results above." >> $GITHUB_STEP_SUMMARY
            echo "**Do NOT proceed with release until failures are resolved.**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test-extensions.result }}" == "success" ]]; then
            echo "### Ready to Release" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To create a release:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "# For stable release:" >> $GITHUB_STEP_SUMMARY
            echo "git tag v3.0.0" >> $GITHUB_STEP_SUMMARY
            echo "git push origin v3.0.0" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "# For prerelease:" >> $GITHUB_STEP_SUMMARY
            echo "git tag v3.1.0-beta.1" >> $GITHUB_STEP_SUMMARY
            echo "git push origin v3.1.0-beta.1" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The release workflow will **promote** these release candidates:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$DISTRO_SUMMARY" | jq -r '.[] | "- **\(.distro)**: \(.status)"' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Promotion steps per distro:" >> $GITHUB_STEP_SUMMARY
            echo "1. Pull candidate image" >> $GITHUB_STEP_SUMMARY
            echo "2. Retag with version tags (e.g., v3.0.0-ubuntu, v3.0.0-fedora)" >> $GITHUB_STEP_SUMMARY
            echo "3. Sign with Cosign (keyless)" >> $GITHUB_STEP_SUMMARY
            echo "4. Generate and attach SBOM" >> $GITHUB_STEP_SUMMARY
            echo "5. Create GitHub release with binaries" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Fix Failures First" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Review test logs for failed extensions per distro" >> $GITHUB_STEP_SUMMARY
            echo "2. Fix issues in codebase" >> $GITHUB_STEP_SUMMARY
            echo "3. Commit and push fixes" >> $GITHUB_STEP_SUMMARY
            echo "4. Wait for CI to build new images" >> $GITHUB_STEP_SUMMARY
            echo "5. Re-run pre-release tests" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Pre-release testing validates CI release candidates before promotion._" >> $GITHUB_STEP_SUMMARY
          echo "_The release workflow promotes the candidates by retagging (no rebuild)._" >> $GITHUB_STEP_SUMMARY
