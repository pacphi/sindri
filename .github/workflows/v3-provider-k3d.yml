# Reusable Workflow: k3d Provider
# Tests extensions in Kubernetes pods using k3d cluster
# NOTE: k3d clusters are local — all tests run on the same runner as the cluster
name: "v3: Provider - k3d"

on:
  workflow_call:
    inputs:
      extensions:
        description: 'JSON array of extension names to test'
        type: string
        required: true
      max-parallel:
        description: 'Maximum parallel pods (within the single runner)'
        type: number
        default: 4
      cluster-agents:
        description: 'Number of k3d agent nodes'
        type: number
        default: 0
      sindri-image:
        description: 'Sindri container image to test'
        type: string
        default: 'ghcr.io/pacphi/sindri:latest'
      artifact-prefix:
        description: 'Prefix for artifact names (for multi-distro isolation)'
        type: string
        default: ''

    outputs:
      results:
        description: 'Test results JSON'
        value: ${{ jobs.test.outputs.results }}
      passed:
        description: 'Number of passed tests'
        value: ${{ jobs.test.outputs.passed }}
      failed:
        description: 'Number of failed tests'
        value: ${{ jobs.test.outputs.failed }}

env:
  CLUSTER_NAME: sindri-test
  REGISTRY_NAME: sindri-registry
  REGISTRY_PORT: 5050

jobs:
  # Run all tests on one runner since k3d cluster is local
  test:
    name: Test Extensions on k3d
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.aggregate.outputs.results }}
      passed: ${{ steps.aggregate.outputs.passed }}
      failed: ${{ steps.aggregate.outputs.failed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Create Registry and Cluster
        run: |
          # Create local registry
          k3d registry create ${{ env.REGISTRY_NAME }} --port ${{ env.REGISTRY_PORT }}

          # Create cluster with registry
          k3d cluster create ${{ env.CLUSTER_NAME }} \
            --registry-use k3d-${{ env.REGISTRY_NAME }}:${{ env.REGISTRY_PORT }} \
            --agents ${{ inputs.cluster-agents }} \
            --wait \
            --timeout 300s \
            --k3s-arg "--disable=traefik@server:0" \
            --k3s-arg "--disable=servicelb@server:0"

          # Wait for cluster to be ready
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Push Sindri Image to Registry
        run: |
          docker pull ${{ inputs.sindri-image }}
          docker tag ${{ inputs.sindri-image }} localhost:${{ env.REGISTRY_PORT }}/sindri:latest
          docker push localhost:${{ env.REGISTRY_PORT }}/sindri:latest

      - name: Test All Extensions
        id: run-tests
        env:
          EXTENSIONS_JSON: ${{ inputs.extensions }}
        run: |
          set -uo pipefail

          RESULTS="[]"
          PASSED=0
          FAILED=0

          for EXT_NAME in $(echo "$EXTENSIONS_JSON" | jq -r '.[]'); do
            echo "========================================"
            echo "Testing: $EXT_NAME"
            echo "========================================"

            POD_NAME="test-$(echo "$EXT_NAME" | tr '_' '-' | tr '[:upper:]' '[:lower:]')"

            # Get extension requirements
            EXT_FILE="v3/extensions/$EXT_NAME/extension.yaml"
            if [[ -f "$EXT_FILE" ]]; then
              MEMORY=$(yq -r '.requirements.memory // 512' "$EXT_FILE")
              CPU=$(yq -r '.requirements.cpu // 500' "$EXT_FILE")
            else
              MEMORY=512
              CPU=500
            fi

            # Deploy test pod
            echo "::group::Deploy pod for $EXT_NAME"
            kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${POD_NAME}
            labels:
              app: sindri-test
              extension: ${EXT_NAME}
          spec:
            containers:
            - name: sindri
              image: k3d-${{ env.REGISTRY_NAME }}:${{ env.REGISTRY_PORT }}/sindri:latest
              imagePullPolicy: Always
              resources:
                requests:
                  memory: "${MEMORY}Mi"
                  cpu: "${CPU}m"
                limits:
                  memory: "${MEMORY}Mi"
                  cpu: "${CPU}m"
              command: ["sleep", "infinity"]
            restartPolicy: Never
          EOF

            if ! kubectl wait --for=condition=Ready "pod/$POD_NAME" --timeout=120s; then
              echo "::endgroup::"
              echo "Pod failed to start for $EXT_NAME"
              RESULT=$(jq -n --arg ext "$EXT_NAME" '{extension: $ext, provider: "k3d", install: {result: "error", duration: 0}, validate: {result: "skipped"}, overall: "failed"}')
              RESULTS=$(echo "$RESULTS" | jq --argjson r "$RESULT" '. + [$r]')
              FAILED=$((FAILED + 1))
              kubectl delete pod "$POD_NAME" --ignore-not-found --wait=false
              continue
            fi
            echo "::endgroup::"

            # Install extension
            echo "::group::Install $EXT_NAME"
            START_TIME=$(date +%s)
            if kubectl exec "$POD_NAME" -- sindri extension install "$EXT_NAME" --yes 2>&1; then
              INSTALL_RESULT="success"
            else
              INSTALL_RESULT="failure"
            fi
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "::endgroup::"

            # Validate if install succeeded
            VALIDATE_RESULT="skipped"
            if [[ "$INSTALL_RESULT" == "success" ]]; then
              echo "::group::Validate $EXT_NAME"
              if kubectl exec "$POD_NAME" -- sindri extension validate "$EXT_NAME" 2>&1; then
                VALIDATE_RESULT="success"
              else
                VALIDATE_RESULT="failure"
              fi
              echo "::endgroup::"

              echo "::group::Remove $EXT_NAME"
              kubectl exec "$POD_NAME" -- sindri extension remove "$EXT_NAME" --yes 2>&1 || true
              echo "::endgroup::"
            fi

            # Cleanup pod
            kubectl delete pod "$POD_NAME" --ignore-not-found --wait=false

            # Record result
            if [[ "$INSTALL_RESULT" == "success" && "$VALIDATE_RESULT" == "success" ]]; then
              OVERALL="passed"
              PASSED=$((PASSED + 1))
            else
              OVERALL="failed"
              FAILED=$((FAILED + 1))
            fi

            RESULT=$(jq -n \
              --arg ext "$EXT_NAME" \
              --arg ir "$INSTALL_RESULT" \
              --argjson dur "$DURATION" \
              --arg vr "$VALIDATE_RESULT" \
              --arg ov "$OVERALL" \
              '{extension: $ext, provider: "k3d", install: {result: $ir, duration: $dur}, validate: {result: $vr}, overall: $ov}')
            RESULTS=$(echo "$RESULTS" | jq --argjson r "$RESULT" '. + [$r]')

            echo "$EXT_NAME: install=$INSTALL_RESULT validate=$VALIDATE_RESULT duration=${DURATION}s"
          done

          # Write outputs
          {
            echo "results<<EOF"
            echo "$RESULTS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          if [[ "$FAILED" -gt 0 ]]; then
            echo "::error::$FAILED extension(s) failed on k3d"
            exit 1
          fi

      - name: Aggregate Results
        id: aggregate
        run: |
          echo 'results<<EOF' >> $GITHUB_OUTPUT
          echo '${{ steps.run-tests.outputs.results }}' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo "passed=${{ steps.run-tests.outputs.passed }}" >> $GITHUB_OUTPUT
          echo "failed=${{ steps.run-tests.outputs.failed }}" >> $GITHUB_OUTPUT

      - name: Cleanup Cluster
        if: always()
        run: |
          k3d cluster delete ${{ env.CLUSTER_NAME }} || true
          k3d registry delete ${{ env.REGISTRY_NAME }} || true
          echo "Cluster and registry cleaned up"

      - name: Generate Summary
        if: always()
        env:
          TEST_RESULTS: ${{ steps.run-tests.outputs.results }}
        run: |
          echo "## k3d Provider Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster Agents:** ${{ inputs.cluster-agents }}" >> $GITHUB_STEP_SUMMARY
          echo "**Passed:** ${{ steps.run-tests.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "**Failed:** ${{ steps.run-tests.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Extension | Install | Validate | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|----------|----------|" >> $GITHUB_STEP_SUMMARY

          echo "$TEST_RESULTS" | jq -r '.[] | "| \(.extension) | " +
            (if .install.result == "success" then "pass" else "fail" end) + " | " +
            (if .validate.result == "success" then "pass" elif .validate.result == "skipped" then "skip" else "fail" end) +
            " | \(.install.duration)s |"' >> $GITHUB_STEP_SUMMARY
