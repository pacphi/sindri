# DevPod AWS Development Environment
#
# A DevPod workspace running on an EC2 instance in AWS.
# Uses a c5.xlarge instance with 40 GB disk by default.
#
# Prerequisites:
#   - Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY environment variables
#   - DevPod CLI installed (https://devpod.sh)
#
# Usage:
#   cp devpod-aws.yaml sindri.yaml
#   sindri deploy

version: "3.0"
name: devpod-aws-dev

deployment:
  provider: devpod
  image: ghcr.io/sindri-labs/sindri:latest
  resources:
    memory: 8GB
    cpus: 4

providers:
  devpod:
    type: aws
    aws:
      region: us-west-2
      instanceType: c5.xlarge
      diskSize: 40
