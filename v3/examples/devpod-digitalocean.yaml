# DevPod DigitalOcean Development Environment
#
# A DevPod workspace running on a DigitalOcean Droplet.
# Uses a s-4vcpu-8gb droplet in the NYC3 region.
#
# Prerequisites:
#   - Set DIGITALOCEAN_ACCESS_TOKEN environment variable
#   - Get your token at https://cloud.digitalocean.com/account/api/tokens
#   - DevPod CLI installed (https://devpod.sh)
#
# Usage:
#   cp devpod-digitalocean.yaml sindri.yaml
#   sindri deploy

version: "3.0"
name: devpod-do-dev

deployment:
  provider: devpod
  image: ghcr.io/sindri-labs/sindri:latest
  resources:
    memory: 8GB
    cpus: 4

providers:
  devpod:
    type: digitalocean
    digitalocean:
      region: nyc3
      size: s-4vcpu-8gb
