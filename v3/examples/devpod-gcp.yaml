# DevPod GCP Development Environment
#
# A DevPod workspace running on a Compute Engine VM in Google Cloud.
# Uses an e2-standard-4 instance with 40 GB balanced persistent disk.
#
# Prerequisites:
#   - Set GCP_CREDENTIALS environment variable (service account JSON)
#   - DevPod CLI installed (https://devpod.sh)
#
# Usage:
#   cp devpod-gcp.yaml sindri.yaml
#   sindri deploy

version: "3.0"
name: devpod-gcp-dev

deployment:
  provider: devpod
  image: ghcr.io/sindri-labs/sindri:latest
  resources:
    memory: 8GB
    cpus: 4

providers:
  devpod:
    type: gcp
    gcp:
      zone: us-central1-a
      machineType: e2-standard-4
      diskSize: 40
      diskType: pd-balanced
