# Docker Basic Development Environment
#
# A simple local development setup using Docker. No cloud credentials needed.
# Docker must be installed and running on the host machine.
#
# Prerequisites:
#   - Docker installed and running
#
# Usage:
#   cp docker-basic.yaml sindri.yaml
#   sindri deploy

version: "3.0"
name: docker-dev

deployment:
  provider: docker
  image: ghcr.io/sindri-labs/sindri:latest
  resources:
    memory: 4GB
    cpus: 2

providers:
  docker:
    network: bridge
    restart: unless-stopped
