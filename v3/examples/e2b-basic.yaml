# E2B Basic Sandbox Environment
#
# A simple cloud sandbox using E2B. Sandboxes auto-pause after timeout
# and resume on demand. Internet access is enabled by default.
#
# Prerequisites:
#   - Set E2B_API_KEY environment variable
#   - Get your key at https://e2b.dev/dashboard
#
# Usage:
#   cp e2b-basic.yaml sindri.yaml
#   sindri deploy

version: "3.0"
name: e2b-dev

deployment:
  provider: e2b
  image: ghcr.io/sindri-labs/sindri:latest
  resources:
    memory: 4GB
    cpus: 2

providers:
  e2b:
    timeout: 300
    reuseTemplate: true
    autoPause: true
    autoResume: true
    internetAccess: true
