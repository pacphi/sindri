---
metadata:
  name: agentic-qe
  version: 1.4.0
  description: >-
    Agentic Quality Engineering v3 with AI-powered test generation, coverage analysis, and multi-agent workflows.
  category: ai-agents
  distros: [ubuntu, fedora, opensuse]
  author: Sindri Team
  homepage: https://github.com/proffesor-for-testing/agentic-qe
  dependencies:
    - claude-cli
    - nodejs
    - python
requirements:
  domains:
    - registry.npmjs.org
    - github.com
    - api.anthropic.com
  diskSpace: 500
  memory: 512
  installTime: 120
install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true
configure:
  environment:
    - key: AQE_HOME
      value: $HOME/.agentic-qe
      scope: bashrc
validate:
  commands:
    - name: aqe
      versionFlag: --version
      expectedPattern: "3\\.\\d+\\.\\d+(-[a-z]+(\\.[0-9]+)?)?"
  mise:
    tools:
      - npm:agentic-qe
    minToolCount: 1
remove:
  confirmation: true
  mise:
    removeConfig: true
    tools:
      - npm:agentic-qe
  paths:
    - ~/.agentic-qe
    - ./.agentic-qe
upgrade:
  strategy: automatic
  mise:
    upgradeAll: true
    tools:
      - npm:agentic-qe
capabilities:
  # Project initialization capability
  project-init:
    enabled: true
    priority: 50
    commands:
      - command: "aqe init --auto --with-all-platforms"
        description: "Initialize Agentic Quality Engineering framework v3"
        requiresAuth: anthropic
    state-markers:
      - path: ".agentic-qe"
        type: directory
        description: "Agentic QE configuration directory (config, memory.db, data, workers)"
      - path: ".claude/agents/v3"
        type: directory
        description: "QE agent definitions (51 qe-*.md files, subagents/, templates/)"
      - path: ".claude/docs"
        type: directory
        description: "QE documentation (v3-agents-index.md)"
      - path: ".claude/guidance"
        type: directory
        description: "Governance constitution and 12 shard files"
      - path: ".claude/helpers"
        type: directory
        description: "Brain checkpoint and v3 helper scripts"
      - path: ".claude/hooks"
        type: directory
        description: "Hook configs (cross-phase-memory, v3-domain-workers)"
      - path: ".claude/skills"
        type: directory
        description: "77 QE skill directories with SKILL.md, evals, schemas"
    validation:
      command: "aqe --version"
      expectedPattern: "3\\.\\d+\\.\\d+(-[a-z]+(\\.[0-9]+)?)?"
  # Authentication requirements (requires Anthropic API for AI-powered test generation)
  auth:
    provider: anthropic
    required: true
    envVars:
      - ANTHROPIC_API_KEY
    validator:
      command: "claude --version"
      expectedExitCode: 0
  # Lifecycle hooks
  hooks:
    post-install:
      command: >-
        mise reshim && sleep 2 &&
        INSTALL_DIR=$(mise where npm:agentic-qe 2>/dev/null) &&
        if [ -n "$INSTALL_DIR" ] && [ -d "$INSTALL_DIR" ]; then
          echo "Rebuilding native modules in $INSTALL_DIR..." &&
          for MODULE in better-sqlite3 hnswlib-node sharp; do
            MOD_DIR=$(find "$INSTALL_DIR" -path "*/${MODULE}/package.json" -maxdepth 8 2>/dev/null | head -1 | xargs dirname 2>/dev/null) &&
            if [ -n "$MOD_DIR" ] && [ -d "$MOD_DIR" ]; then
              echo "  Rebuilding ${MODULE} in $MOD_DIR..." &&
              (cd "$MOD_DIR" &&
                npx --yes prebuild-install --runtime napi --target 9 2>&1 ||
                npm run install 2>&1 ||
                echo "WARN: ${MODULE} native rebuild failed") ;
            fi ;
          done &&
          echo "Native module rebuild complete" ;
        else
          echo "WARN: agentic-qe install dir not found" ;
        fi
      description: "Refresh shims and rebuild native modules (better-sqlite3, hnswlib-node, sharp)"
    pre-project-init:
      command: "echo 'Initializing agentic-qe project...'"
      description: "Pre-initialization setup"
    post-project-init:
      command: "true"
      description: "Post-initialization cleanup"
  # Collision handling for cloned projects
  collision-handling:
    enabled: true
    conflict-rules:
      - path: "CLAUDE.md"
        type: file
        on-conflict:
          action: append
          separator: "\n\n---\n\n"
      # Critical JSON merges
      - path: ".claude/mcp.json"
        type: file
        on-conflict:
          action: merge-json
      - path: ".claude/settings.json"
        type: file
        on-conflict:
          action: merge-json
      # Root MCP config (aqe init also creates .mcp.json at project root)
      - path: ".mcp.json"
        type: file
        on-conflict:
          action: merge-json
      # Directory merge (agentic-qe runs AFTER claude-flow/ruflo at priority 50)
      - path: ".claude"
        type: directory
        on-conflict:
          action: merge
          backup: false # claude-flow/ruflo already created structure
      - path: ".claude/agents"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".claude/docs"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".claude/guidance"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".claude/helpers"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".claude/hooks"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".claude/skills"
        type: directory
        on-conflict:
          action: merge
          backup: false
    version-markers:
      # Agentic QE marker
      - path: ".agentic-qe"
        type: directory
        version: "installed"
        detection:
          method: directory-exists
    scenarios:
      # Scenario 1: Already installed
      - name: "already-initialized"
        detected-version: "installed"
        installing-version: "1.0.0"
        action: skip
        message: |
          ✓ Agentic QE is already initialized

          To force a fresh installation, run:
            aqe init --yes --force
bom:
  # NOTE: Versions researched 2026-04-21
  tools:
    - name: agentic-qe
      version: "3.9.14"
      source: npm
      type: framework
      license: MIT
      homepage: https://github.com/proffesor-for-testing/agentic-qe
      purl: pkg:npm/agentic-qe@3.9.14
docs:
  title: "Agentic QE"
  overview: |
    Agentic Quality Engineering v3 with AI-powered test generation, coverage analysis, and multi-agent workflows. Comprehensive testing automation framework.
  last-updated: "2026-04-21"
  features:
    - "AI Test Generation - Automatically generate tests from code"
    - "Coverage Analysis - Intelligent coverage gap detection"
    - "Multi-agent Workflows - Parallel quality analysis"
    - "Pattern Learning - Learns from codebase patterns"
  usage:
    - section: "Initialization"
      examples:
        - description: "Initialize in project"
          code: "aqe init --auto"
        - description: "Check version"
          code: "aqe --version"
    - section: "Test Generation"
      examples:
        - description: "Generate tests for a file"
          code: "aqe generate tests src/module.ts"
        - description: "Generate tests for entire project"
          code: "aqe generate tests --all"
        - description: "Generate with specific framework"
          code: "aqe generate tests --framework jest src/"
    - section: "Coverage Analysis"
      examples:
        - description: "Analyze coverage gaps"
          code: "aqe analyze coverage"
        - description: "Generate coverage report"
          code: "aqe report coverage --format html"
    - section: "Quality Workflows"
      examples:
        - description: "Run full quality check"
          code: "aqe run quality"
        - description: "Run specific checks"
          code: |
            aqe run lint
            aqe run security
            aqe run complexity
  related:
    - name: nodejs
      description: "Required dependency"
