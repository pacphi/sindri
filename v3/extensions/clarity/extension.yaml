---
metadata:
  name: clarity
  version: 1.0.0
  description: Autonomous spec generation skill that produces implementable specifications from reference materials
  category: ai-dev
  distros: [ubuntu, fedora, opensuse]
  dependencies:
    - python

requirements:
  domains:
    - github.com
    - raw.githubusercontent.com
  diskSpace: 50
  memory: 128
  installTime: 30
  installTimeout: 120
  validationTimeout: 15

install:
  method: script
  script:
    path: scripts/install.sh
    timeout: 120

configure:
  templates:
    - source: templates/SKILL.md
      destination: ~/.claude/skills/clarity/SKILL.md
      mode: overwrite

validate:
  commands: []

remove:
  paths:
    - ~/.claude/skills/clarity
  confirmation: true

capabilities:
  project-init:
    enabled: true
    priority: 80
    commands:
      - command: "mkdir -p .clarity .clarity/evaluations scenarios"
        description: "Initialize Clarity project directories"
        conditional: true
    state-markers:
      - path: ".clarity"
        type: directory
    validation:
      command: "test -d .clarity && test -d scenarios"
      expectedExitCode: 0

  project-context:
    enabled: true
    mergeFile:
      source: templates/SKILL.md
      target: CLAUDE.md
      strategy: append-if-missing

  collision-handling:
    enabled: true
    conflict-rules:
      - path: ".clarity"
        type: directory
        on-conflict:
          action: merge
          backup: true
      - path: "scenarios"
        type: directory
        on-conflict:
          action: merge
          backup: true

bom:
  # NOTE: Versions researched 2026-02-25
  tools:
    - name: clarity
      version: "1.0.0"
      source: script
      type: cli-tool
      license: MIT
      homepage: https://github.com/francyjglisboa/clarity
      purl: pkg:github/francyjglisboa/clarity@main

docs:
  title: "Clarity Spec Generation Skill"
  overview: |
    Clarity is an autonomous specification generation agent skill that consumes reference materials
    (repositories, URLs, codebases, documentation) and produces structured, implementable specifications
    through a five-phase workflow. The key innovation is a holdout scenario set that enables independent
    verification of implementation against specification requirements.
  last-updated: "2026-02-25"
  features:
    - "Five-phase autonomous workflow: Ingest, Specify, Scenario, Handoff, Evaluate"
    - "Holdout test set separation - scenarios never leak to implementation agents"
    - "Structured requirements with unique IDs, priorities (MUST/SHOULD/COULD), and acceptance criteria"
    - "Given/When/Then behavioral scenarios for independent verification"
    - "Self-contained implementation handoff prompts for any AI coding agent"
    - "Resume support - detects existing artifacts and continues from last phase"
    - "Quick mode for abbreviated analysis with full assumption tagging"
    - "Brownfield support with current state and delta specification sections"
    - "Multi-reference support: GitHub repos, local codebases, web URLs, free text"
    - "Compatible with Claude Code, GitHub Copilot CLI, Cursor, Gemini CLI, and VS Code"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Generate spec from a GitHub repo"
          code: "/clarity https://github.com/someone/repo"
        - description: "Analyze a local codebase"
          code: "/clarity /path/to/codebase"
        - description: "Combine multiple references"
          code: "/clarity https://github.com/repo https://docs.example.com/api \"add payment processing\""
    - section: "Quick Mode"
      examples:
        - description: "Fast analysis with liberal assumptions"
          code: "/clarity quick /path/to/codebase"
    - section: "Resume and Evaluate"
      examples:
        - description: "Resume from last completed phase"
          code: "/clarity resume"
        - description: "Evaluate implementation against holdout scenarios"
          code: "/clarity evaluate"
    - section: "Project Initialization"
      examples:
        - description: "Initialize Clarity project structure"
          code: "mkdir -p .clarity .clarity/evaluations scenarios"
          language: bash
        - description: "Initialize via Python script"
          code: "python ~/.claude/skills/clarity/scripts/init_project.py"
          language: bash
  related:
    - name: spec-kit
      description: "GitHub specification kit for AI-powered repository documentation"
    - name: claude-cli
      description: "Claude Code CLI - primary agent for executing Clarity handoff prompts"
    - name: kilo
      description: "Kilo Code AI assistant - alternative agent for Clarity handoff execution"
  notes: |
    ## Output Artifacts

    | Phase | Output | Content |
    |-------|--------|---------|
    | 1. INGEST | `.clarity/context.md` | Extracted context from all references |
    | 2. SPECIFY | `.clarity/spec.md` | Structured specification with FR/NFR IDs |
    | 3. SCENARIO | `scenarios/SC-NNN-*.md` | Holdout behavioral scenarios (Given/When/Then) |
    | 4. HANDOFF | `.clarity/handoff.md` | Implementation prompt for AI agents |
    | 5. EVALUATE | `.clarity/evaluations/eval-*.md` | Pass/fail evaluation report |

    ## Holdout Principle

    The key design principle is that scenarios are a holdout set - implementing agents never access them,
    enabling independent verification of specification compliance. Add to your project's CLAUDE.md:

    ```
    # Holdout Scenarios
    Do NOT read or reference the `scenarios/` directory. It contains holdout test scenarios for independent evaluation.
    ```

    ## Supported Agent Platforms

    Clarity works as a skill across multiple AI agent platforms:
    - **Claude Code**: `~/.claude/skills/clarity/`
    - **GitHub Copilot CLI**: `~/.copilot/skills/clarity/`
    - **VS Code Copilot**: `.clarity-skill/` or prompt file
    - **Cursor**: Project-level skill configuration
    - **Gemini CLI**: agentskills.io compatible

    More information: https://github.com/francyjglisboa/clarity
