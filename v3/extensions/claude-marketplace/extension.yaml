---
metadata:
  name: claude-marketplace
  version: 2.1.0
  description: Claude Code plugin marketplace integration via JSON configuration
  category: claude
  distros: [ubuntu, fedora, opensuse]
  author: Sindri Team
  dependencies:
    - claude-cli
requirements:
  domains:
    - schemastore.org
  diskSpace: 50
  memory: 0
  installTime: 30
  # Claude CLI may be slow to respond on first run
  validationTimeout: 30
install:
  method: script
  script:
    path: install.sh
    timeout: 300
configure:
  templates:
    # Local environment gets full marketplace list (10 marketplaces)
    - source: marketplaces.local.json
      destination: ~/.claude/settings.json
      mode: merge
      condition:
        env:
          not_any:
            - CI: "true"
            - GITHUB_ACTIONS: "true"

    # CI environment gets minimal marketplace list (3 marketplaces)
    - source: marketplaces.ci.json
      destination: ~/.claude/settings.json
      mode: merge
      condition:
        env:
          any:
            - CI: "true"
            - GITHUB_ACTIONS: "true"

    # Claude settings.json merged in all environments
    - source: default-settings.json
      destination: ~/.claude/settings.json
      mode: merge
      condition: null  # Always process
validate:
  commands:
    - name: claude
      expectedPattern: "\\d+\\.\\d+\\.\\d+.*Claude Code"
remove:
  paths: []
upgrade:
  strategy: none
bom:
  tools:
    - name: claude-code
      version: dynamic  # Script installer (gets latest)
      source: binary
      type: cli-tool
      license: Proprietary
      homepage: https://claude.ai/code
docs:
  title: "Claude Marketplace"
  overview: |
    Claude Code plugin marketplace integration via JSON configuration. Provides automated configuration
    of plugin marketplaces that merge directly into `~/.claude/settings.json`. Curated plugin categories
    span AI development, life sciences, financial analysis, workflow automation, code review, security,
    and Java/Spring modernization.
  last-updated: "2026-03-05"
  features:
    - "Multiple Marketplaces - Access 10 marketplace sources (9 GitHub + 1 local) or 3 (CI)"
    - "Standalone Plugin Wrapper - sindri-standalone marketplace wraps plugins lacking marketplace.json"
    - "Curated Plugin Categories - Plugins organized across AI dev, life sciences, finance, automation, and more"
    - "Official + Community Sources - Includes Anthropic official plugins alongside community marketplaces"
    - "JSON Configuration - Native Claude Code settings format"
    - "Environment-aware - Automatic CI/local detection"
    - "Settings Merging - Deep merge preserves existing Claude settings"
  usage:
    - section: "Configuration Structure"
      examples:
        - description: "The extension merges JSON into ~/.claude/settings.json"
          code: |
            {
              "$schema": "https://json.schemastore.org/claude-code-settings.json",
              "extraKnownMarketplaces": {
                "beads-marketplace": {
                  "source": {
                    "source": "github",
                    "repo": "steveyegge/beads"
                  }
                },
                "cc-blueprint-toolkit": {
                  "source": {
                    "source": "github",
                    "repo": "croffasia/cc-blueprint-toolkit"
                  }
                }
              },
              "enabledPlugins": {
                "beads@beads-marketplace": true,
                "bp@cc-blueprint-toolkit": true
              }
            }
    - section: "Managing Marketplaces"
      examples:
        - code: |
            # View current configuration
            cat ~/.claude/settings.json | jq '.extraKnownMarketplaces, .enabledPlugins'

            # Reinstall to update (idempotent)
            sindri extension install claude-marketplace

            # Claude Code automatically registers marketplaces
            claude /plugin marketplace list
  related:
    - name: claude-cli
      description: "Claude Code CLI (required dependency)"
    - name: openskills
      description: "Skill management CLI"
    - name: nodejs
      description: "Node.js runtime (recommended for many plugins)"
  notes: |
    Marketplace Sources (Local, 9 total):
      beads-marketplace - Issue tracking and natural language programming
      cc-blueprint-toolkit - Project scaffolding and architecture templates
      claude-equity-research-marketplace - Financial analysis and equity research
      n8n-mcp-skills - Workflow automation integration
      life-sciences - Anthropic's official life sciences research plugins
      spring-m11n-marketplace - Automated Spring Boot 4.x migrations
      everything-claude-code - Comprehensive Claude Code resources
      claude-code-plugins - Anthropic's Claude Code plugins
      claude-plugins-official - Anthropic's official plugin directory

    sindri-standalone (local marketplace wrapping plugins without marketplace.json):
      seine - Multi-domain agentic search with 21 AI agents (adambkovacs/seine-agentic-search-orchestrator-plugin)

    CI Configuration (Minimal): beads-marketplace, cc-blueprint-toolkit, claude-equity-research-marketplace.
