metadata:
  name: draupnir
  version: 1.1.0
  description: Sindri instance agent for mimir fleet management
  category: devops
  tags:
    - agent
    - fleet
    - monitoring
    - websocket
  homepage: https://github.com/pacphi/draupnir
  dependencies: []

install:
  method: script
  script:
    path: install.sh
    timeout: 120
    args: ["1.1.0"]

configure:
  environment:
    - key: ANTHROPIC_BASE_URL
      value: "http://localhost:9090/v1/anthropic"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: OPENAI_BASE_URL
      value: "http://localhost:9090/v1/openai"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: GOOGLE_API_BASE_URL
      value: "http://localhost:9090/v1/google"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: GROQ_BASE_URL
      value: "http://localhost:9090/v1/groq"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: MISTRAL_BASE_URL
      value: "http://localhost:9090/v1/mistral"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: CO_API_URL
      value: "http://localhost:9090/v1/cohere"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: TOGETHER_API_BASE
      value: "http://localhost:9090/v1/together"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"
    - key: AZURE_OPENAI_ENDPOINT
      value: "http://localhost:9090/v1/azure"
      condition: "{{ env.SINDRI_LLM_ADAPTER != 'none' }}"

service:
  enabled: true
  start:
    command: "draupnir"
    pidfile: ~/.sindri/draupnir.pid
    logfile: ~/.sindri/logs/draupnir.log
  stop:
    timeout: 10
  readiness:
    check: "kill -0 $(cat ~/.sindri/draupnir.pid 2>/dev/null) 2>/dev/null"
    timeout: 5
  requires-env:
    - SINDRI_CONSOLE_URL

capabilities:
  hooks:
    post-install:
      command: "bash scripts/start.sh"
      description: "Start draupnir agent as background daemon"

validate:
  commands:
    - name: draupnir
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"

remove:
  script:
    path: scripts/remove.sh
    timeout: 30
  paths:
    - ~/.local/bin/draupnir
    - ~/.sindri/draupnir.pid
    - ~/.sindri/logs/draupnir.log
  confirmation: true

bom:
  tools:
    - name: draupnir
      version: "1.1.0"
      source: github-release
      type: cli-tool
      license: MIT
      homepage: https://github.com/pacphi/draupnir
      purl: pkg:github/pacphi/draupnir@v1.1.0
