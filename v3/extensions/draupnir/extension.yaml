metadata:
  name: draupnir
  version: 1.0.0
  description: Sindri instance agent for mimir fleet management
  category: devops
  tags:
    - agent
    - fleet
    - monitoring
    - websocket
  homepage: https://github.com/pacphi/draupnir
  dependencies: []

install:
  method: script
  script:
    path: install.sh
    timeout: 120

validate:
  commands:
    - name: draupnir
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"
