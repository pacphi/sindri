---
metadata:
  name: glab
  version: 1.0.0
  description: GitLab CLI for merge requests, issues, pipelines, and CI/CD
  category: devops
  distros: [ubuntu, fedora, opensuse]
  author: Sindri Team
  dependencies:
    - mise-config

requirements:
  domains:
    - gitlab.com
    - registry.npmjs.org
  diskSpace: 100
  memory: 128
  installTime: 60
  installTimeout: 300
  validationTimeout: 30

install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true

validate:
  commands:
    - name: glab
      versionFlag: --version
      expectedPattern: "glab version \\d+\\.\\d+\\.\\d+"

remove:
  mise:
    removeConfig: true
    tools: ["glab"]

upgrade:
  strategy: automatic

bom:
  # NOTE: Versions researched 2026-03-20
  tools:
    - name: glab
      version: "1.89.0"
      source: mise
      type: cli-tool
      license: MIT
      homepage: https://gitlab.com/gitlab-org/cli
      purl: pkg:golang/gitlab.com/gitlab-org/cli@1.89.0

docs:
  title: "GitLab CLI (glab)"
  overview: |
    glab is the official GitLab CLI tool, bringing GitLab workflows to your terminal.
    Interact with merge requests, issues, pipelines, CI/CD jobs, snippets, and more
    without leaving the command line.
  last-updated: "2026-03-20"
  features:
    - "Merge request management (create, review, merge, approve)"
    - "Issue tracking and management"
    - "Pipeline and CI/CD job monitoring"
    - "Repository operations (clone, fork, view)"
    - "Snippet creation and management"
    - "Release management"
    - "Label and milestone management"
    - "SSH key management"
    - "Support for GitLab.com and self-managed instances"
    - "Tab completion for Bash, Zsh, Fish, and PowerShell"
  usage:
    - section: "Authentication"
      examples:
        - description: "Login to GitLab.com"
          code: "glab auth login"
        - description: "Login to self-managed instance"
          code: "glab auth login --hostname gitlab.example.com"
        - description: "Check auth status"
          code: "glab auth status"
    - section: "Merge Requests"
      examples:
        - code: |
            # Create a merge request
            glab mr create --title "Feature: Add new API" --description "Details here"

            # List open merge requests
            glab mr list

            # View a merge request
            glab mr view 42

            # Checkout a merge request locally
            glab mr checkout 42

            # Approve a merge request
            glab mr approve 42

            # Merge a merge request
            glab mr merge 42
    - section: "Issues"
      examples:
        - code: |
            # Create an issue
            glab issue create --title "Bug: Login fails" --label bug

            # List issues
            glab issue list

            # View an issue
            glab issue view 123

            # Close an issue
            glab issue close 123

            # Add a note to an issue
            glab issue note 123 --message "Investigating this"
    - section: "Pipelines & CI/CD"
      examples:
        - code: |
            # List recent pipelines
            glab ci list

            # View pipeline status
            glab ci view

            # Trigger a pipeline run
            glab ci run

            # View CI/CD job logs
            glab ci trace

            # Retry failed jobs
            glab ci retry
    - section: "Repository Operations"
      examples:
        - code: |
            # Clone a repository
            glab repo clone owner/repo

            # Fork a repository
            glab repo fork owner/repo

            # View repository details
            glab repo view
    - section: "API Access"
      examples:
        - description: "Make raw API requests to GitLab"
          code: "glab api projects/:id/merge_requests"
  related:
    - name: github-cli
      description: "GitHub CLI - Similar tool for GitHub workflows"
    - name: docker
      description: "Docker tools often used alongside GitLab CI/CD"
  notes: |
    ## Configuration

    glab stores configuration in `~/.config/glab-cli/config.yml`.
    Authentication tokens are stored in `~/.config/glab-cli/hosts.yml`.

    ## Self-Managed GitLab

    To use glab with a self-managed GitLab instance:
    ```bash
    glab auth login --hostname gitlab.example.com
    ```

    ## Environment Variables

    - `GITLAB_TOKEN` — Authentication token (alternative to `glab auth login`)
    - `GITLAB_HOST` — Default GitLab hostname for self-managed instances
    - `GITLAB_API_HOST` — Custom API endpoint for self-managed instances

    More information: https://gitlab.com/gitlab-org/cli/-/blob/main/README.md
