---
metadata:
  name: loki-mode
  version: 1.1.0
  description: >-
    Loki Mode - Autonomous multi-agent development framework that transforms PRDs into production-ready code
  category: ai-agents
  distros: [ubuntu, fedora, opensuse]
  author: Autonomi
  homepage: https://github.com/asklokesh/loki-mode
  license: BSL-1.1
  dependencies:
    - mise-config
    - nodejs

requirements:
  domains:
    - registry.npmjs.org
    - api.github.com
    - github.com
  diskSpace: 500
  memory: 512
  installTime: 90
  installTimeout: 600
  validationTimeout: 30

install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true

validate:
  commands:
    - name: loki
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"
  mise:
    tools:
      - npm:loki-mode
    minToolCount: 1

remove:
  mise:
    removeConfig: true
    tools:
      - npm:loki-mode
  paths:
    - ~/.loki
    - .loki

upgrade:
  strategy: automatic
  mise:
    upgradeAll: true

bom:
  # NOTE: Versions researched 2026-04-21
  tools:
    - name: loki-mode
      version: "6.80.1"
      source: mise
      type: cli-tool
      license: BSL-1.1
      homepage: https://github.com/asklokesh/loki-mode
      purl: pkg:npm/loki-mode@6.80.1

docs:
  title: "Loki Mode"
  overview: |
    Loki Mode is an autonomous multi-agent development framework that transforms Product Requirements Documents (PRDs)
    into fully tested, production-ready code with minimal human intervention. It orchestrates 41 specialized AI agents
    across 8 swarms (engineering, operations, business logic, data, product, growth, review, orchestration) using a
    RARV+C cycle (Reason-Act-Reflect-Verify-Compound). Supports multiple LLM providers including Claude Code, OpenAI
    Codex CLI, and Google Gemini CLI.
  last-updated: "2026-04-21"
  features:
    - "Autonomous PRD-to-code pipeline with 41 specialized agents across 8 swarms"
    - "RARV+C iteration cycle (Reason-Act-Reflect-Verify-Compound)"
    - "Multi-provider support: Claude Code, OpenAI Codex CLI, Google Gemini CLI"
    - "Complexity-tier auto-detection (simple, standard, complex)"
    - "9 quality gates including blind peer review and anti-sycophancy checks"
    - "Completion Council with 3-member voting and convergence detection"
    - "Web dashboard with real-time agent monitoring and task Kanban board"
    - "GitHub integration for issue-to-PRD conversion and PR management"
    - "Cross-project knowledge compounding and three-tier memory system"
    - "Docker sandbox mode for isolated execution"
    - "Enterprise features: token auth, RBAC, OIDC/SSO, audit logging, TLS"
    - "Parallel workflow execution with git worktrees"
    - "Voice interface for hands-free operation"
    - "Prometheus metrics and multi-channel notifications (Slack, Discord, webhooks)"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Check installed version"
          code: "loki --version"
        - description: "Run system prerequisite check"
          code: "loki doctor"
        - description: "Interactive 60-second demo (no codebase changes)"
          code: "loki demo"
    - section: "Session Management"
      examples:
        - description: "Start autonomous build from a PRD"
          code: "loki start my-feature.md"
        - description: "Quick single-task mode (max 3 iterations)"
          code: "loki quick \"Add input validation to the login form\""
        - description: "Build a PRD interactively"
          code: "loki init"
        - description: "Check session status"
          code: "loki status"
        - description: "Pause and resume execution"
          code: |
            loki pause
            loki resume
    - section: "Provider Management"
      examples:
        - description: "List available LLM providers"
          code: "loki provider list"
        - description: "Set provider to Claude Code"
          code: "loki provider set claude"
        - description: "Show current provider details"
          code: "loki provider show"
    - section: "GitHub Integration"
      examples:
        - description: "Convert a GitHub issue to a PRD and build it"
          code: "loki issue https://github.com/org/repo/issues/42"
        - description: "Import GitHub issues as tasks"
          code: "loki import"
        - description: "Create a PR from completed work"
          code: "loki github pr"
    - section: "Dashboard"
      examples:
        - description: "Launch web dashboard"
          code: "loki dashboard start"
        - description: "Open dashboard in browser"
          code: "loki dashboard open"
    - section: "Quality & Governance"
      examples:
        - description: "View Completion Council status"
          code: "loki council status"
        - description: "AI-powered code review"
          code: "loki review --staged"
        - description: "Generate tests for changed files"
          code: "loki test --changed"
    - section: "Memory & Knowledge"
      examples:
        - description: "Search cross-project learnings"
          code: "loki memory search \"authentication patterns\""
        - description: "List compounded knowledge solutions"
          code: "loki compound list"
    - section: "Configuration"
      examples:
        - description: "Show current configuration"
          code: "loki config show"
        - description: "Edit configuration"
          code: "loki config edit"
        - description: "Install shell tab completions"
          code: "loki completions zsh"
  related:
    - name: ruflo
      description: "Ruflo - AI agent orchestration platform"
    - name: agentic-flow
      description: "Agentic workflow automation"
    - name: claude-cli
      description: "Claude Code CLI - primary LLM provider for Loki Mode"
    - name: nodejs
      description: "Required Node.js 16+ runtime dependency"
  notes: |
    ## Provider Requirements

    Loki Mode requires at least one LLM provider CLI installed and authenticated:
    - **Claude Code** (recommended): Full parallel agent support, MCP integration, 10+ concurrent agents
    - **OpenAI Codex CLI**: Sequential execution only, degraded feature set
    - **Google Gemini CLI**: Sequential execution only, 1M token context

    Provider cannot be switched mid-session.

    ## Configuration

    Configuration is loaded in priority order (later overrides earlier):
    1. Built-in defaults
    2. User-global: `~/.config/loki-mode/config.yaml`
    3. Project-local: `.loki/config.yaml`
    4. Environment variables: `LOKI_<SECTION>_<OPTION>`

    Key environment variables:
    - `LOKI_PROVIDER`: Set LLM provider (claude, codex, gemini)
    - `LOKI_MAX_RETRIES`: Maximum retry attempts (default: 50)
    - `LOKI_DASHBOARD`: Enable/disable web dashboard
    - `LOKI_SANDBOX_MODE`: Enable Docker sandbox isolation
    - `LOKI_PARALLEL_MODE`: Enable parallel workflow execution

    ## Complexity Tiers

    | Tier | Phases | Duration | Files |
    |------|--------|----------|-------|
    | Simple | 3 | 5-30 min | 1-2 |
    | Standard | 7 | 30-90 min | 3-10 |
    | Complex | 9 | 2+ hours | 10+ |

    ## License

    Business Source License 1.1 (converts to Apache 2.0 on March 19, 2030).

    More information: https://github.com/asklokesh/loki-mode
