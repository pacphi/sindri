# nodejs-devtools.toml - npm global dev tools configuration for mise
# Requires nodejs.toml to be installed first

[tools]
# Pinned to major.minor for stable, reproducible installations
"npm:typescript" = "6.0.3"
"npm:ts-node" = "10.9"
"npm:eslint" = "10"
"npm:@typescript-eslint/parser" = "8.59.0"
"npm:@typescript-eslint/eslint-plugin" = "8.59.0"
"npm:prettier" = "3.8"
"npm:nodemon" = "3.1"

[tasks.format]
description = "Format code with Prettier"
run = "prettier --write ."

[tasks.lint]
description = "Lint code with ESLint"
run = "eslint ."

[tasks.typecheck]
description = "Type check with TypeScript"
run = "tsc --noEmit"
