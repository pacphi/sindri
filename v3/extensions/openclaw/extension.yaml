---
metadata:
  name: openclaw
  version: 1.1.0
  description: OpenClaw - Multi-channel AI gateway for messaging platforms with browser Control UI
  category: ai-dev
  distros: [ubuntu, fedora, opensuse]
  dependencies:
    - mise-config
    - nodejs

requirements:
  domains:
    - openclaw.ai
    - docs.openclaw.ai
    - registry.npmjs.org
    - api.github.com
  diskSpace: 400
  memory: 512
  installTime: 120
  installTimeout: 600
  validationTimeout: 30

service:
  enabled: true
  ports:
    - containerPort: 18789
      hostPort: 18789
      protocol: http
      name: web-ui
      description: "OpenClaw browser Control UI"
      ui: true
  start:
    command: "openclaw gateway --port 18789"
    pidfile: "~/.sindri/openclaw.pid"
    logfile: "~/.sindri/logs/openclaw.log"

install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true

validate:
  commands:
    - name: openclaw
      versionFlag: --version
      expectedPattern: "\\d{4}\\.\\d+\\.\\d+"

remove:
  mise:
    removeConfig: true
    tools: ["npm:openclaw"]

bom:
  # NOTE: Versions researched 2026-03-21
  tools:
    - name: openclaw
      version: "2026.3.13"
      source: mise
      type: cli-tool
      license: MIT
      homepage: https://github.com/openclaw/openclaw
      purl: pkg:npm/openclaw@2026.3.13

docs:
  title: "OpenClaw AI Gateway"
  overview: |
    OpenClaw is a multi-channel AI gateway that connects AI agents to messaging platforms
    including WhatsApp, Telegram, Discord, iMessage, Slack, and Teams. It provides a
    browser-based Control UI, configurable agent workspaces, proactive heartbeat automation,
    per-sender session management, and media handling. Supports multiple LLM providers
    including Anthropic Claude, OpenAI, and custom OpenAI/Anthropic-compatible endpoints.
  last-updated: "2026-03-21"
  features:
    - "Multi-channel messaging (WhatsApp, Telegram, Discord, iMessage, Slack, Teams)"
    - "Browser-based Control UI dashboard (localhost:18789)"
    - "Gateway service with token-based authentication"
    - "Agent workspace with configurable SOUL.md, TOOLS.md, IDENTITY.md, HEARTBEAT.md"
    - "Proactive heartbeat mode with customizable intervals"
    - "Per-sender session scope with automatic daily resets"
    - "Media handling (inbound attachments and outbound via MEDIA:<path> syntax)"
    - "Custom LLM provider configuration (OpenAI-compatible and Anthropic-compatible)"
    - "DM safety and approval workflows through pairing"
    - "Onboarding wizard with QuickStart and Advanced modes"
    - "Built-in web_search (Brave Search API) and web_fetch skills"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Check installed version"
          code: "openclaw --version"
        - description: "Run the onboarding wizard"
          code: "openclaw onboard"
        - description: "Run onboarding with daemon installation"
          code: "openclaw onboard --install-daemon"
    - section: "Gateway Management"
      examples:
        - description: "Check gateway status"
          code: "openclaw gateway status"
        - description: "Start gateway on custom port"
          code: "openclaw gateway --port 18789"
        - description: "Open the browser Control UI"
          code: "openclaw dashboard"
    - section: "Messaging"
      examples:
        - description: "Send a test message"
          code: "openclaw message send --target +15555550123 --message \"Hello\""
        - description: "Pair WhatsApp via QR code"
          code: "openclaw channels login"
    - section: "Configuration & Diagnostics"
      examples:
        - description: "Reconfigure settings post-onboarding"
          code: "openclaw configure"
        - description: "Check local system status"
          code: "openclaw status"
        - description: "Full diagnostic report"
          code: "openclaw status --all"
        - description: "Deep health check with gateway probes"
          code: "openclaw status --deep"
        - description: "Gateway health snapshot as JSON"
          code: "openclaw health --json"
    - section: "Agent Management"
      examples:
        - description: "Create an additional agent"
          code: "openclaw agents add my-agent"
  related:
    - name: claude-cli
      description: "Claude Code CLI - can serve as the LLM backend for OpenClaw agents"
    - name: ai-toolkit
      description: "Collection of AI CLI tools that complement OpenClaw's agent capabilities"
  notes: |
    ## Configuration

    OpenClaw stores configuration in `~/.openclaw/openclaw.json`. Key settings include:

    - `channels.whatsapp.allowFrom` - Whitelist phone numbers
    - `agent.model` - LLM model selection (supports Claude models)
    - `agent.thinkingDefault` - Extended thinking configuration
    - `agent.heartbeat.every` - Heartbeat interval (default: 30 minutes)
    - `session.scope` - Session boundary definition
    - `logging.level` - Log verbosity

    ## Environment Variables

    - `OPENCLAW_HOME` - Sets home directory for path resolution
    - `OPENCLAW_STATE_DIR` - Overrides state directory location
    - `OPENCLAW_CONFIG_PATH` - Overrides config file path

    ## Agent Workspace

    The workspace (`~/.openclaw/workspace`) contains customizable files:
    - `AGENTS.md` - Agent definitions
    - `SOUL.md` - Agent personality and behavior
    - `TOOLS.md` - Available tools configuration
    - `IDENTITY.md` - Agent identity settings
    - `USER.md` - User preferences
    - `HEARTBEAT.md` - Proactive automation tasks

    ## LLM Provider Support

    During onboarding, select from:
    - **Anthropic** - Claude models (recommended)
    - **OpenAI** - GPT models
    - **Custom Provider** - Any OpenAI-compatible or Anthropic-compatible endpoint

    More information: https://docs.openclaw.ai
