---
metadata:
  name: opencode
  version: 2.0.0
  description: OpenCode - Open source AI coding agent for terminal, desktop, and IDE integration
  category: ai-dev
  distros: [ubuntu, fedora, opensuse]
  dependencies:
    - mise-config
    - nodejs

requirements:
  domains:
    - opencode.ai
    - registry.npmjs.org
    - api.github.com
  diskSpace: 300
  memory: 512
  installTime: 90
  installTimeout: 600
  validationTimeout: 30

install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true

validate:
  commands:
    - name: opencode
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"

remove:
  mise:
    removeConfig: true
    tools: ["npm:opencode-ai"]

bom:
  # NOTE: Versions researched 2026-04-21
  tools:
    - name: opencode
      version: "1.14.19"
      source: mise
      type: cli-tool
      license: Apache-2.0
      homepage: https://opencode.ai
      purl: pkg:npm/opencode-ai@1.14.19

docs:
  title: "OpenCode AI Coding Agent"
  overview: |
    OpenCode is an open source AI coding agent available as a terminal CLI, desktop application, and IDE extension.
    It analyzes codebases, answers questions about code, suggests implementation plans, and writes/modifies code based on user requests.
    Supports 75+ LLM providers including Anthropic Claude, OpenAI, Azure, Google, and self-hosted models.
  last-updated: "2026-04-21"
  features:
    - "Terminal-based AI coding assistant"
    - "Multi-provider LLM support (75+ providers)"
    - "Codebase analysis and understanding"
    - "Interactive planning mode before implementation"
    - "Code generation and modification"
    - "Undo/redo support for changes"
    - "GitHub integration via GitHub App"
    - "Configuration via opencode.json with environment variable support"
    - "Custom provider configuration for OpenAI-compatible APIs"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Check installed version"
          code: "opencode --version"
        - description: "Get help"
          code: "opencode --help"
        - description: "Initialize OpenCode in a project"
          code: "opencode /init"
    - section: "Provider Configuration"
      examples:
        - description: "Connect to an LLM provider"
          code: "opencode /connect"
        - description: "View available providers"
          code: "opencode /providers"
    - section: "GitHub Integration"
      examples:
        - description: "Install GitHub integration"
          code: "opencode github install"
        - description: "Use in GitHub issues (mention in comment)"
          code: "@opencode /review"
    - section: "Core Commands"
      examples:
        - description: "Analyze a file (@file_path)"
          code: "opencode @src/main.ts"
        - description: "Undo last change"
          code: "opencode /undo"
        - description: "Share conversation with team"
          code: "opencode /share"
  related:
    - name: kilo
      description: "Kilo Code - Terminal-based AI pair programming"
    - name: claude-cli
      description: "Claude Code CLI - Official Anthropic AI coding assistant"
    - name: ai-toolkit
      description: "Collection of AI CLI tools and coding assistants"
    - name: claudish
      description: "Claude Code CLI proxy with multi-provider support"
  notes: |
    ## Configuration

    OpenCode stores configuration in `opencode.json` in your project directory or globally in `~/.local/share/opencode/config.json`.

    Provider credentials are stored in `~/.local/share/opencode/auth.json`.

    ## LLM Provider Support

    - **OpenCode Zen**: Pre-tested models verified by the OpenCode team
    - **OpenCode Go**: Low-cost subscriptions for popular open models
    - **75+ Providers**: Including Anthropic, OpenAI, Azure, Google, Groq, and more
    - **Custom Providers**: Configure any OpenAI-compatible API endpoint

    ## GitHub Integration

    OpenCode can be integrated with GitHub Actions to automate code review, issue triage, and PR management.
    Use `/opencode` or `/oc` mentions in issue/PR comments to trigger automated tasks.

    More information: https://opencode.ai/docs/
