---
metadata:
  name: p-replicator
  version: 1.0.0
  description: P-Replicator — Claude Code toolkit for AI-assisted product development and Vibe Coding
  category: ai-dev
  dependencies:
    - mise-config
    - nodejs

requirements:
  domains:
    - registry.npmjs.org
    - github.com
  diskSpace: 200
  memory: 256
  installTime: 60
  installTimeout: 300
  validationTimeout: 30

install:
  method: mise
  mise:
    configFile: mise.toml
    reshimAfterInstall: true

validate:
  commands:
    - name: p-replicator
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"

remove:
  mise:
    removeConfig: true
    tools: ["npm:@dzhechkov/p-replicator"]

bom:
  # NOTE: Versions researched 2026-03-03
  tools:
    - name: p-replicator
      version: "1.1.0"
      source: mise
      type: cli-tool
      license: MIT
      homepage: https://github.com/dzhechko/pu-unicorn-replicate
      purl: pkg:npm/%40dzhechkov/p-replicator@1.1.0

docs:
  title: "P-Replicator"
  overview: |
    P-Replicator is a Claude Code toolkit for AI-assisted product development (Vibe Coding).
    It transforms a product idea into a fully documented, validated, toolkit-equipped project
    ready for development through a multi-phase pipeline with interactive checkpoints.
    Includes 10 modular skills (~200K chars), 2 commands (/replicate, /harvest),
    4 agents, and quality gates with swarm validation.
  last-updated: "2026-03-03"
  features:
    - "Full /replicate pipeline: Discovery → Planning → Validation → Toolkit → Finalize"
    - "10 modular skills with composable architecture (foundation → composite → master orchestrator)"
    - "/harvest knowledge extraction for cross-project learning"
    - "Swarm validation with 5 parallel agents and scoring (INVEST/SMART/BDD)"
    - "SPARC documentation generator producing 11 structured documents"
    - "Toolkit generator with commands, agents, rules, skills, and hooks"
    - "Interactive checkpoints at each phase for review and control"
    - "Integration with @dzhechkov/keysarium for shared skill management"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Check installed version"
          code: "p-replicator --version"
        - description: "Initialize in a project"
          code: "npx @dzhechkov/p-replicator init"
        - description: "Health check"
          code: "npx @dzhechkov/p-replicator doctor"
    - section: "Core Pipeline"
      examples:
        - description: "Run the full /replicate pipeline in Claude Code"
          code: '/replicate "Online marketplace for handmade crafts with AI-powered recommendations"'
        - description: "Quick knowledge extraction"
          code: "/harvest quick"
        - description: "Full harvest pipeline with checkpoints"
          code: "/harvest full"
    - section: "Management"
      examples:
        - description: "List installed components"
          code: "npx @dzhechkov/p-replicator list"
        - description: "Update to latest version"
          code: "npx @dzhechkov/p-replicator update"
        - description: "Remove from project"
          code: "npx @dzhechkov/p-replicator remove"
  related:
    - name: claude-cli
      description: "Claude Code CLI - Required runtime for /replicate and /harvest commands"
    - name: kilo
      description: "Kilo Code - Alternative AI coding assistant"
    - name: ai-toolkit
      description: "Collection of AI CLI tools and coding assistants"
  notes: |
    ## Pipeline Phases

    The /replicate pipeline walks through 4-5 phases with interactive checkpoints:

    - **Phase 0** (optional): Product Discovery — activates for SaaS, startups, and new products
    - **Phase 1**: Planning — generates 11 SPARC documents
    - **Phase 2**: Validation — 5 parallel swarm agents validate documentation quality
    - **Phase 3**: Toolkit Generation — creates Claude Code commands, agents, rules, skills, and hooks
    - **Phase 4**: Finalization — infrastructure scaffolding and git commit

    ## Post-Pipeline Commands

    After /replicate completes: /start, /feature, /plan, /go, /run, /next, /deploy, /myinsights, /docs

    ## Keysarium Integration

    If @dzhechkov/keysarium is detected during init, P-Replicator integrates with the existing
    setup, sharing .claude/commands, .claude/rules, and .claude/agents directories.

    More information: https://github.com/dzhechko/pu-unicorn-replicate
