---
metadata:
  name: rtk
  version: 1.0.0
  description: "RTK (Rust Token Killer) - High-performance CLI proxy that reduces LLM token consumption by 60-90%"
  category: ai-dev
  author: rtk-ai
  license: MIT
  homepage: https://github.com/rtk-ai/rtk
  dependencies: []

requirements:
  domains:
    - github.com
    - api.github.com
    - objects.githubusercontent.com
  diskSpace: 50
  memory: 32
  installTime: 30
  installTimeout: 120
  validationTimeout: 10

install:
  method: script
  script:
    path: scripts/install.sh
    timeout: 120

configure:
  environment:
    - key: PATH
      value: "$HOME/.local/bin:$PATH"
      scope: bashrc

validate:
  commands:
    - name: rtk
      versionFlag: --version
      expectedPattern: "\\d+\\.\\d+\\.\\d+"

remove:
  paths:
    - ~/.local/bin/rtk
    - ~/.config/rtk
  script:
    path: scripts/uninstall.sh
  confirmation: true

upgrade:
  strategy: reinstall

capabilities:
  hooks:
    post-install:
      command: "rtk --version"
      description: "Verify RTK installation"

  collision-handling:
    enabled: true
    conflict-rules:
      - path: ".claude/settings.json"
        type: file
        on-conflict:
          action: merge-json

bom:
  # NOTE: Versions researched 2026-03-18
  tools:
    - name: rtk
      version: "0.30.1"
      source: script
      type: cli-tool
      license: MIT
      homepage: https://github.com/rtk-ai/rtk
      purl: pkg:github/rtk-ai/rtk@v0.30.1

docs:
  title: "RTK (Rust Token Killer)"
  overview: |
    RTK is a high-performance CLI proxy that reduces LLM token consumption by 60-90%.
    It smart-filters, groups, truncates, and deduplicates command outputs before they
    reach language model contexts. Built as a single Rust binary with zero dependencies
    and <10ms overhead per execution.
  last-updated: "2026-03-18"
  features:
    - "Reduces LLM token consumption by 60-90% via smart output filtering"
    - "Auto-rewrite hook for Claude Code — transparently converts commands (e.g., git status → rtk git status)"
    - "Supports 50+ commands: git, testing, linting, containers, data tools"
    - "Token savings analytics with rtk gain and rtk discover"
    - "Full output recovery via tee mode for debugging failed commands"
    - "Single Rust binary, zero dependencies, <10ms overhead"
    - "Cross-platform: macOS (x86_64, aarch64), Linux (x86_64, aarch64)"
  usage:
    - section: "Getting Started"
      examples:
        - description: "Install the Claude Code auto-rewrite hook (global)"
          code: "rtk init -g"
          language: bash
        - description: "Verify hook installation"
          code: "rtk init --show"
          language: bash
        - description: "Check version"
          code: "rtk --version"
          language: bash
    - section: "File & Git Operations"
      examples:
        - description: "Smart file listing"
          code: "rtk ls"
          language: bash
        - description: "Read a file with token-efficient output"
          code: "rtk read file.rs"
          language: bash
        - description: "Git status with compressed output"
          code: "rtk git status"
          language: bash
        - description: "Git log (filtered)"
          code: "rtk git log"
          language: bash
    - section: "Testing & Linting"
      examples:
        - description: "Run tests (shows failures only)"
          code: "rtk test cargo test"
          language: bash
        - description: "Lint check"
          code: "rtk lint"
          language: bash
        - description: "TypeScript check"
          code: "rtk tsc"
          language: bash
    - section: "Analytics"
      examples:
        - description: "View token savings"
          code: "rtk gain"
          language: bash
        - description: "View savings over time"
          code: "rtk gain --graph"
          language: bash
        - description: "Discover commands that could benefit from RTK"
          code: "rtk discover"
          language: bash
    - section: "Configuration"
      examples:
        - description: "RTK config file location"
          code: |
            # Linux/macOS: ~/.config/rtk/config.toml
            [tracking]
            database_path = "/path/to/custom.db"

            [hooks]
            exclude_commands = ["curl", "playwright"]

            [tee]
            enabled = true
            mode = "failures"
          language: toml
  related:
    - name: claude-cli
      description: "RTK integrates with Claude Code via auto-rewrite hooks"
    - name: opencode
      description: "RTK supports OpenCode via plugin hooks"
  notes: |
    RTK's auto-rewrite hook transparently intercepts Bash tool calls in Claude Code,
    converting commands like `git status` to `rtk git status` before execution.
    Built-in Claude Code tools (Read, Grep, Glob) bypass the hook — use shell
    commands or explicit `rtk` calls for those workflows.
