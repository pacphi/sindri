---
metadata:
  name: ruflo
  version: 3.5.2
  description: "Ruflo - AI Agent Orchestration Platform with multi-agent swarms, HNSW search, and 215 MCP tools"
  category: claude
  author: ruvnet
  homepage: https://github.com/ruvnet/ruflo
  dependencies:
    - claude-cli
    - nodejs
requirements:
  domains:
    - registry.npmjs.org
    - github.com
  diskSpace: 250
  memory: 256
  installTime: 90
  installTimeout: 300
install:
  method: mise
  mise:
    configFile: mise.toml
configure:
  templates:
    - source: ruflo.aliases
      destination: ~/.bashrc
      mode: append
    - source: commands/github/check-ci.md
      destination: ~/.claude/commands/github/check-ci.md
      mode: overwrite
      description: Check GitHub Actions workflow status
    - source: commands/git/commit.md
      destination: ~/.claude/commands/git/commit.md
      mode: overwrite
      description: Analyze git changes and create intelligent commit
  environment:
    - key: RUFLO_VERSION
      value: "3.5"
      scope: bashrc
    - key: PATH
      value: "$HOME/.local/bin:$PATH"
      scope: bashrc
    - key: RF_SWARM_TOPOLOGY
      value: "hierarchical-mesh"
      scope: bashrc
    - key: RF_CONSENSUS_ALGO
      value: "raft"
      scope: bashrc
    - key: RF_LLM_PROVIDER
      value: "anthropic"
      scope: bashrc
    - key: RF_DAEMON_AUTOSTART
      value: "true"
      scope: bashrc
    - key: RF_FLASH_ATTENTION
      value: "true"
      scope: bashrc
    - key: RF_MCP_TRANSPORT
      value: "stdio"
      scope: bashrc
    - key: RF_MCP_AUTOSTART
      value: "false"
      scope: bashrc
validate:
  commands:
    - name: ruflo
      expectedPattern: "ruflo v\\d+\\.\\d+\\.\\d+(-[a-z]+(\\. \\d+)?)?"
remove:
  mise:
    removeConfig: true
    tools:
      - "npm:ruflo"
  paths:
    - ~/.claude/commands/github/check-ci.md
    - ~/.claude/commands/git/commit.md
  confirmation: true
upgrade:
  strategy: automatic
  mise:
    upgradeAll: true
    tools:
      - "npm:ruflo"
capabilities:
  project-init:
    enabled: true
    priority: 20
    commands:
      - command: "ruflo init --start-all --topology hierarchical-mesh"
        description: "Initialize Ruflo with all services (swarm, daemon, memory, hooks)"
        requiresAuth: anthropic
        conditional: false
      - command: "ruflo doctor --fix"
        description: "Run health check and auto-fix common issues"
        requiresAuth: none
        conditional: true
    state-markers:
      - path: ".claude"
        type: directory
        description: "Claude Code configuration directory"
      - path: ".claude/config.json"
        type: file
        description: "Unified config (replaces multiple settings files)"
      - path: ".claude/swarm.state"
        type: file
        description: "Swarm coordinator state (created if swarm initialized)"
      - path: ".claude/hooks"
        type: directory
        description: "Hook system directory (created if hooks initialized)"
    validation:
      command: "ruflo --version && ruflo doctor --check"
      expectedPattern: "ruflo v\\d+\\.\\d+\\.\\d+(-[a-z]+(\\. \\d+)?)?"
      expectedExitCode: 0
  auth:
    provider: anthropic
    required: false
    methods:
      - api-key
      - cli-auth
    envVars:
      - ANTHROPIC_API_KEY
    validator:
      command: "claude --version"
      expectedExitCode: 0
    features:
      - name: agent-spawn
        requiresApiKey: false
        description: "CLI-based agent spawning"
      - name: api-integration
        requiresApiKey: true
        description: "Direct API features"
  hooks:
    post-install:
      command: "bash scripts/install-plugins.sh"
      description: "Verify installation and install core plugins"
    post-project-init:
      command: "true"
      description: "Initialization complete"
  mcp:
    enabled: true
    server:
      command: "npx"
      args:
        - "-y"
        - "ruflo@latest"
        - "mcp"
        - "start"
        - "--transport"
        - "${RF_MCP_TRANSPORT:-stdio}"
      env:
        RUFLO_MCP_MODE: "1"
        RF_SWARM_TOPOLOGY: "${RF_SWARM_TOPOLOGY:-hierarchical-mesh}"
        RF_CONSENSUS_ALGO: "${RF_CONSENSUS_ALGO:-raft}"
    tools:
      - name: "ruflo-agent-spawn"
        description: "Spawn specialized AI agents (15-agent hierarchy)"
      - name: "ruflo-memory-store"
        description: "Store patterns in unified memory (150x-12,500x faster HNSW)"
      - name: "ruflo-swarm-coordinate"
        description: "Coordinate multi-agent swarms (UnifiedSwarmCoordinator)"
      - name: "ruflo-hooks-dispatch"
        description: "Dispatch background workers (31 hooks + 12 workers)"
      - name: "ruflo-security-scan"
        description: "Security scanning with CVE remediation"
      - name: "ruflo-performance-benchmark"
        description: "Performance benchmarking (Flash Attention, SONA)"
      - name: "ruflo-swarm-topology"
        description: "Configure swarm topology (hierarchical-mesh, mesh, ring, hierarchical)"
      - name: "ruflo-daemon-control"
        description: "Control background daemon and workers"
      - name: "ruflo-goal-planning"
        description: "Goal-oriented action planning (GOAP)"
      - name: "ruflo-consensus"
        description: "Select consensus algorithm (raft, paxos, gossip, crdt, byzantine)"
      - name: "ruflo-plugin-manage"
        description: "Plugin lifecycle management"
      - name: "ruflo-llm-provider"
        description: "Configure LLM provider (anthropic, openai, google, cohere, local)"
      - name: "ruflo-neural-sona"
        description: "SONA self-optimizing neural architecture"
      - name: "ruflo-flash-attention"
        description: "Flash Attention optimization controls"
      - name: "ruflo-claims-manage"
        description: "Work claims and authorization"
  collision-handling:
    enabled: true
    conflict-rules:
      - path: "CLAUDE.md"
        type: file
        on-conflict:
          action: append
          separator: "\n\n---\n\n"
      - path: ".claude/mcp.json"
        type: file
        on-conflict:
          action: merge-json
      - path: ".claude/settings.json"
        type: file
        on-conflict:
          action: merge-json
      - path: ".mcp.json"
        type: file
        on-conflict:
          action: merge-json
      - path: ".claude"
        type: directory
        on-conflict:
          action: merge
          backup: false
      - path: ".ruflo"
        type: directory
        on-conflict:
          action: merge
          backup: false
    version-markers:
      - path: ".claude/config.json"
        type: file
        version: "ruflo"
        detection:
          method: content-match
          patterns:
            - '"swarm"'
            - '"sona"'
          match-any: true
      - path: ".claude/memory.db"
        type: file
        version: "v2"
        detection:
          method: file-exists
      - path: ".claude/memory"
        type: directory
        version: "v2"
        detection:
          method: directory-exists
      # Co-tenant marker: agentic-qe
      - path: ".agentic-qe"
        type: directory
        version: "agentic-qe"
        detection:
          method: directory-exists
      - path: ".claude"
        type: directory
        version: "unknown"
        detection:
          method: directory-exists
          exclude-if:
            - ".claude/config.json"
            - ".claude/memory.db"
            - ".claude/memory"
            - ".agentic-qe"
    scenarios:
      - name: "v2-to-ruflo-upgrade"
        detected-version: "v2"
        installing-version: "3.5.2"
        action: stop
        message: |
          Claude Flow V2 installation detected.

          Your project has an existing Claude Flow V2 setup.
          To migrate to Ruflo, please run these commands manually:

            1. Install ruflo:
               sindri extension install ruflo

            2. Migrate memory (AgentDB to HNSW):
               ruflo memory migrate --from v2

            3. Migrate configuration:
               ruflo doctor --fix

          Skipping automatic initialization to prevent data loss.
      - name: "same-version-ruflo"
        detected-version: "ruflo"
        installing-version: "3.5.2"
        action: skip
        message: |
          Ruflo is already initialized.

          To force a fresh installation, run:
            ruflo init --full --force
      - name: "agentic-qe-coexist"
        detected-version: "agentic-qe"
        installing-version: "3.5.2"
        action: proceed
        message: |
          Agentic QE detected as co-tenant.

          Ruflo will merge into the existing .claude directory
          without overwriting agentic-qe configuration.
      - name: "unknown-origin"
        detected-version: "unknown"
        installing-version: "3.5.2"
        action: stop
        message: |
          Existing .claude directory detected (unknown origin).

          Your project has a .claude directory that doesn't match
          known Claude Flow V2, V3, or Ruflo structure.

          Options:
            1. Backup and reinitialize: mv .claude .claude.backup && ruflo init --full --force
            2. Skip initialization: (do nothing)

          Skipping automatic initialization for safety.
bom:
  tools:
    - name: ruflo
      version: "3.5.2"
      source: npm
      type: cli-tool
      license: MIT
      homepage: https://github.com/ruvnet/ruflo
      purl: pkg:npm/ruflo@3.5.2
docs:
  title: "Ruflo"
  overview: |
    Ruflo is the successor to Claude Flow, providing AI agent orchestration with
    multi-agent swarms, HNSW-powered search (150x-12,500x faster), Flash Attention
    optimization, and 215 MCP tools. The ruflo npm package is a thin branded wrapper
    around @claude-flow/cli - all claude-flow commands work identically via ruflo.
  last-updated: "2026-03-04"
  features:
    - "15-agent hierarchy - Specialized agent roles"
    - "HNSW search - 150x-12,500x faster pattern retrieval"
    - "Flash Attention - 2.49x-7.47x memory efficiency"
    - "SONA learning - Self-optimizing neural architecture"
    - "31 hooks + 12 workers - Comprehensive automation"
    - "UnifiedSwarmCoordinator - Advanced swarm management"
    - "215 MCP tools - Comprehensive tool integration"
    - "Branded successor to Claude Flow with identical functionality"
  usage:
    - section: "Initialization"
      examples:
        - description: "Full initialization with all services"
          code: "ruflo init --start-all --topology hierarchical-mesh"
        - description: "Run health check"
          code: "ruflo doctor --fix"
        - description: "Check version"
          code: "ruflo --version"
    - section: "Agent Management"
      examples:
        - description: "Spawn an agent"
          code: "ruflo agent spawn --type coder"
        - description: "List agents"
          code: "ruflo agent list"
        - description: "Coordinate swarm"
          code: "ruflo swarm coordinate --task \"implement feature\""
    - section: "Memory Operations"
      examples:
        - description: "Store pattern"
          code: "ruflo memory store --key \"pattern:auth\" --value \"JWT implementation\""
        - description: "Search patterns (HNSW-powered)"
          code: "ruflo memory search --query \"authentication\""
    - section: "MCP Server"
      examples:
        - description: "Start MCP server"
          code: "npx ruflo@latest mcp start --transport stdio"
  related:
    - name: claude-flow-v2
      description: "Predecessor (deprecated)"
    - name: claude-flow-v3
      description: "Predecessor (deprecated)"
    - name: nodejs
      description: "Required dependency"
