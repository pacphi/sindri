[workspace]
resolver = "2"
members = [
    "crates/sindri",
    "crates/sindri-core",
    "crates/sindri-registry",
    "crates/sindri-resolver",
    "crates/sindri-policy",
    "crates/sindri-backends",
    "crates/sindri-targets",
    "crates/sindri-discovery",
    "crates/sindri-extensions",
    "tools/schema-gen",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
schemars = { version = "1.2", features = ["derive"] }
clap = { version = "4", features = ["derive"] }
thiserror = "2"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
tracing = "0.1"
sha2 = "0.11"
hex = "0.4"
dirs-next = "2"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
semver = "1"
