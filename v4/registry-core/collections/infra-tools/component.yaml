metadata:
  name: infra-tools
  version: "2026.04"
  description: "Infrastructure & K8s tooling (Terraform, K8s, Carvel, Pulumi, Ansible)"
  type: meta
  license: MIT
  homepage: "https://github.com/sindri-dev/registry-core"

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install: {}

depends_on:
  - "mise:terraform"
  - "mise:kubectl"
  - "mise:helm"
  - "mise:packer"
  - "mise:k9s"
  - "mise:kustomize"
  - "mise:yq"
  - "apt:ansible"
  - "script:pulumi"
  - "script:crossplane"
  - "binary:kubectx"
  - "binary:kubens"
  - "binary:kapp"
  - "binary:ytt"
  - "binary:kbld"
  - "binary:vendir"
  - "binary:imgpkg"
