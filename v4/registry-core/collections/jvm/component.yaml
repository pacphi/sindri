metadata:
  name: jvm
  version: "2026.04"
  description: "JVM toolchain (Java, Kotlin, Scala, Gradle, Maven, Groovy) via SDKMAN"
  type: meta
  license: MIT
  homepage: "https://github.com/sindri-dev/registry-core"

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install: {}

depends_on:
  - "script:sdkman"
  - "sdkman:java"
  - "sdkman:maven"
  - "sdkman:gradle"
  - "sdkman:kotlin"
  - "sdkman:scala"
  - "sdkman:groovy"
