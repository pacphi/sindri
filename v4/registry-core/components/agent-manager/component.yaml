metadata:
  name: agent-manager
  version: "1.0.0"
  description: "Agent lifecycle manager"
  license: MIT
  homepage: "https://github.com/sindri-dev/agent-manager"
  tags:
    - ai
    - agents

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@anthropic-ai/agent-manager"
    global: true

depends_on:
  - "mise:nodejs"
