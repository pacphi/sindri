metadata:
  name: agent-skills-cli
  version: "1.0.0"
  description: "CLI for managing agent skills"
  license: MIT
  homepage: "https://github.com/sindri-dev/agent-skills-cli"
  tags:
    - ai
    - skills

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@sindri/agent-skills-cli"
    global: true

depends_on:
  - "mise:nodejs"
