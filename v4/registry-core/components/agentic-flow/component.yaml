metadata:
  name: agentic-flow
  version: "1.0.0"
  description: "agentic-flow orchestration CLI"
  license: MIT
  homepage: "https://github.com/ruvnet/agentic-flow"
  tags:
    - ai
    - agents

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "agentic-flow"
    global: true

depends_on:
  - "npm:claude-code"
  - "mise:nodejs"
