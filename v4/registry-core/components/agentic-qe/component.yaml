metadata:
  name: agentic-qe
  version: "1.0.0"
  description: "Agentic quality-engineering harness"
  license: MIT
  homepage: "https://github.com/ruvnet/agentic-qe"
  tags:
    - ai
    - testing

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "agentic-qe"
    global: true

depends_on:
  - "npm:claude-code"
  - "mise:nodejs"
  - "mise:python"
