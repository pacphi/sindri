metadata:
  name: aliyun
  version: "3.3.10"
  description: "Alibaba Cloud CLI"
  license: Apache-2.0
  homepage: "https://alibabacloud.com/help/cli"
  tags:
    - cloud
    - alibaba

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/aliyun/aliyun-cli/releases/download/v{version}/aliyun-cli-{os}-{version}-{arch}.tgz"
    install_path: "~/.local/bin/aliyun"
    checksums:
      linux-x86_64: "sha256:fdb34aefd7206c5773c53ba9ac7431cb39d2d0d9ee4d8e796aab739426e2cd9d"
      linux-aarch64: "sha256:faf49cf41c126ecedf1d7a256a8ce07adfcc7333b53efb73c35e45c6055b23a9"
      macos-x86_64: "sha256:5bb8b53bc42db0c3282b8c0b63fc7938b091ef41170c826288f703c36f4e3b1d"
      macos-aarch64: "sha256:23f3f379f0f41bc5cbbf5e97b3ec95568719d074a5ff97da4c782b046aa9b92a"

depends_on: []

# ADR-026: auth-aware components (Phase 3 P1).
# `aliyun configure` supports an interactive AK/SK or RAM-role flow, so these
# tokens are optional. When both are present, the CLI runs fully headless.
auth:
  tokens:
    - name: alibaba-cloud-access-key-id
      description: "Alibaba Cloud RAM access key ID."
      audience: "https://sts.aliyuncs.com"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: ALIBABA_CLOUD_ACCESS_KEY_ID
    - name: alibaba-cloud-access-key-secret
      description: "Alibaba Cloud RAM access key secret."
      audience: "https://sts.aliyuncs.com"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: ALIBABA_CLOUD_ACCESS_KEY_SECRET
