      linux-x86_64: "sha256:9a077a102f0a35fcf8714537b0ec3210b55adaf8ff5a100502dcc0e270ff8609"
      linux-aarch64: "sha256:9ce0b00b7926ea7b4f6fd7576e6b0e14ee783fe101e077fd861dc423be3b74e3"

depends_on: []
