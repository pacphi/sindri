metadata:
  name: azure-cli
  version: "2.85.0"
  description: "Azure CLI"
  license: MIT
  homepage: "https://docs.microsoft.com/cli/azure"
  tags:
    - cloud
    - azure

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  pipx:
    package: "azure-cli"

depends_on:
  - "mise:python"

# ADR-026: auth-aware components (Phase 3 P1).
# Azure CLI supports interactive `az login`, so service-principal credentials
# are declared optional. When all three are present they enable headless auth.
auth:
  tokens:
    - name: azure-client-id
      description: "Azure AD application (client) ID for service-principal login."
      audience: "https://management.azure.com/"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: AZURE_CLIENT_ID
    - name: azure-client-secret
      description: "Azure AD application client secret."
      audience: "https://management.azure.com/"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: AZURE_CLIENT_SECRET
    - name: azure-tenant-id
      description: "Azure AD tenant ID for service-principal login."
      audience: "https://management.azure.com/"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: AZURE_TENANT_ID
