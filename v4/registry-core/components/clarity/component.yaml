metadata:
  name: clarity
  version: 1.0.0
  description: Clarity spec generator CLI
  license: MIT
  homepage: https://github.com/sindri-dev/clarity
  tags:
  - spec
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
  arch: x86_64
- os: macos
  arch: aarch64
install: {}
depends_on:
- mise:python
capabilities:
  hooks:
    install:
      sh: scripts/install.sh
    validate:
      sh: scripts/validate.sh
    upgrade:
      sh: scripts/upgrade.sh
    uninstall:
      sh: scripts/uninstall.sh
