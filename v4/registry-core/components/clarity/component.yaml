metadata:
  name: clarity
  version: "1.0.0"
  description: "Clarity spec generator CLI"
  license: MIT
  homepage: "https://github.com/sindri-dev/clarity"
  tags:
    - spec

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "mise:python"
