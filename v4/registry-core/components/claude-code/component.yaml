metadata:
  name: claude-code
  version: "1.0.0"
  description: "Claude Code — Anthropic's official CLI"
  license: Apache-2.0
  homepage: "https://github.com/anthropics/claude-code"
  tags:
    - ai
    - anthropic
    - claude

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@anthropic-ai/claude-code"
    global: true

depends_on:
  - "mise:nodejs"

auth:
  tokens:
    - name: anthropic_api_key
      description: "Anthropic API key used by the Claude Code CLI."
      scope: runtime
      optional: false
      audience: "urn:anthropic:api"
      redemption:
        kind: env-var
        env-name: ANTHROPIC_API_KEY
