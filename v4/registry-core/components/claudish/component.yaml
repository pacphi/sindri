metadata:
  name: claudish
  version: "1.0.0"
  description: "claudish — terminal companion for Claude"
  license: MIT
  homepage: "https://github.com/sindri-dev/claudish"
  tags:
    - ai
    - claude

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "claudish"
    global: true

depends_on:
  - "mise:nodejs"
