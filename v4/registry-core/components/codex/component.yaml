metadata:
  name: codex
  version: "0.122.0"
  description: "OpenAI Codex CLI"
  license: MIT
  homepage: "https://github.com/openai/openai-codex"
  tags:
    - ai
    - cli
    - openai

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@openai/codex"
    global: true

depends_on:
  - "mise:nodejs"
