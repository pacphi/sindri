metadata:
  name: context7-mcp
  version: "1.0.0"
  description: "Context7 MCP server registration"
  license: MIT
  homepage: "https://context7.com"
  tags:
    - mcp

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "npm:claude-code"
