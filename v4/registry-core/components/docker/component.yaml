metadata:
  name: docker
  version: "27.3.0"
  description: "Docker Engine (apt/dnf + post-install config)"
  license: Apache-2.0
  homepage: "https://docker.com"
  tags:
    - container
    - docker

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on: []
