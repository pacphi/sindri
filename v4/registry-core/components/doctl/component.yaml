metadata:
  name: doctl
  version: "1.155.0"
  description: "DigitalOcean CLI"
  license: Apache-2.0
  homepage: "https://docs.digitalocean.com/reference/doctl"
  tags:
    - cloud
    - digitalocean

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/digitalocean/doctl/releases/download/v{version}/doctl-{version}-{os}-{arch}.tar.gz"
    install_path: "~/.local/bin/doctl"
    checksums:
      linux-x86_64: "sha256:94f572c89d74a6a894f6238bae07cd55c599a6539f8da7ec9d1a89f09a292180"
      linux-aarch64: "sha256:a6d209eeb157c5855c8d9d6218a385fcf36f2da6d98f96cfbe3a91c13c2d2398"
      macos-x86_64: "sha256:ad6ded342ea443b935ff5f71fc3687d6b4693a3258e230f2f56f734224844e4e"
      macos-aarch64: "sha256:25fea2ed8cb95e9d350a51e65b45a466db4b311640166cf92f39993d0acb56bc"

depends_on: []

# ADR-026: auth-aware components (Phase 3 P1).
# `doctl auth init` accepts an interactive prompt, so the access-token env
# binding is optional but recommended for headless use.
auth:
  tokens:
    - name: digitalocean-access-token
      description: "DigitalOcean personal access token used by doctl."
      audience: "https://api.digitalocean.com"
      scope: runtime
      optional: true
      redemption:
        kind: env-var
        env-name: DIGITALOCEAN_ACCESS_TOKEN
