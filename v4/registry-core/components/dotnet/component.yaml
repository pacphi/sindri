metadata:
  name: dotnet
  version: "9.0"
  description: ".NET SDK via Microsoft install script"
  license: MIT
  homepage: "https://dot.net"
  tags:
    - language
    - dotnet

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on: []
