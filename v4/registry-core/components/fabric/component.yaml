      macos-x86_64: "sha256:ecf90aba495caf90ca78e386832b0282b58e20258e0f2d2b30c1d8a0eacda0b1"
      macos-aarch64: "sha256:10b3cff3c4f01b69b447ef1b250289263bbb8387ebf709c78224c8ca046c998e"

depends_on: []
