      macos-x86_64: "sha256:1ae597f2772ece2bbbc78fb3fc9e86726da905157f9853050e57c719938342d5"
      macos-aarch64: "sha256:6b5627b6a3aca1215501590fecb00c858a00e682336ff37107ea00f6a41e233f"

