metadata:
  name: gcloud
  version: 565.0.0
  description: Google Cloud SDK
  license: Apache-2.0
  homepage: https://cloud.google.com/sdk
  tags:
  - cloud
  - gcp
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
  arch: x86_64
- os: macos
  arch: aarch64
install: {}
depends_on: []
auth:
  tokens:
  - name: google-application-credentials
    description: Path to a Google Cloud service-account JSON key file.
    audience: https://www.googleapis.com/auth/cloud-platform
    scope: runtime
    optional: true
    redemption:
      kind: env-file
      env-name: GOOGLE_APPLICATION_CREDENTIALS
      path: ~/.config/sindri/gcp-credentials.json
capabilities:
  hooks:
    install:
      sh: scripts/install.sh
    validate:
      sh: scripts/validate.sh
    upgrade:
      sh: scripts/upgrade.sh
    uninstall:
      sh: scripts/uninstall.sh
