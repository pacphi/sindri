metadata:
  name: gemini-cli
  version: "0.38.2"
  description: "Google Gemini CLI"
  license: Apache-2.0
  homepage: "https://ai.google.dev"
  tags:
    - ai
    - cli
    - google

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@google/gemini-cli"
    global: true

depends_on:
  - "mise:nodejs"

auth:
  tokens:
    - name: gemini_api_key
      description: "Google Gemini API key used by the Gemini CLI."
      scope: runtime
      optional: false
      audience: "urn:google:generative-language"
      redemption:
        env-var:
          env-name: GEMINI_API_KEY
