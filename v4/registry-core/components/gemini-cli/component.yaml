metadata:
  name: gemini-cli
  version: "0.38.2"
  description: "Google Gemini CLI"
  license: Apache-2.0
  homepage: "https://ai.google.dev"
  tags:
    - ai
    - cli
    - google

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@google/gemini-cli"
    global: true

depends_on:
  - "mise:nodejs"
