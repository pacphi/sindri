metadata:
  name: gh
  version: "2.45.0"
  description: "GitHub CLI"
  license: MIT
  homepage: "https://cli.github.com"
  tags:
    - github
    - cli

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/cli/cli/releases/download/v{version}/gh_{version}_{os}_{arch}.tar.gz"
    install_path: "~/.local/bin/gh"
    checksums:
      linux-x86_64: "sha256:79e89a14af6fc69163aee00e764e86d5809d0c6c77e6f229aebe7a4ed115ee67"
      linux-aarch64: "sha256:bb62c95ecc17a8557a847483ce671bff9909f107ad1961b4efafcd521721c213"
      macos-x86_64: "sha256:82bea89eea5ddfcd5f88c53857fc2220ee361e0b65629f153d10695971a44195"
      macos-aarch64: "sha256:a0423acd5954932a817d531a8160b67cf0456ea6c9e68c11c054c19ea7a6714b"

depends_on: []

auth:
  tokens:
    - name: github_token
      description: "GitHub token used by the gh CLI; avoids the unauthenticated rate-limit cliff in CI."
      scope: runtime
      optional: true
      audience: "https://api.github.com"
      redemption:
        env-var:
          env-name: GITHUB_TOKEN
