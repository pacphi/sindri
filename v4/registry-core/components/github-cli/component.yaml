metadata:
  name: github-cli
  version: "2.45.0"
  description: "GitHub CLI install via distro script (alias of binary:gh)"
  license: MIT
  homepage: "https://cli.github.com"
  tags:
    - github

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "binary:gh"
