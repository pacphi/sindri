metadata:
  name: gitnexus
  version: "1.0.0"
  description: "GitNexus code-intelligence CLI"
  license: MIT
  homepage: "https://github.com/ruvnet/gitnexus"
  tags:
    - code-intelligence

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "gitnexus"
    global: true

depends_on:
  - "npm:claude-code"
  - "mise:nodejs"
