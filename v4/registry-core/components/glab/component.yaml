metadata:
  name: glab
  version: "1.44.0"
  description: "GitLab CLI via mise"
  license: MIT
  homepage: "https://gitlab.com/gitlab-org/cli"
  tags:
    - gitlab
    - cli

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  mise:
    tools:
      glab: "1.44.0"

depends_on: []

auth:
  tokens:
    - name: gitlab_token
      description: "GitLab personal access token used by the glab CLI."
      scope: runtime
      optional: true
      audience: "https://gitlab.com/api/v4"
      redemption:
        env-var:
          env-name: GITLAB_TOKEN
