metadata:
  name: golang
  version: "1.22.0"
  description: "Go programming language via mise"
  license: BSD-3-Clause
  homepage: "https://go.dev"
  tags:
    - language
    - go

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  mise:
    tools:
      go: "1.22.0"

depends_on: []

auth:
  tokens:
    - name: goproxy_github_token
      description: "GitHub token used by GOPROXY for fetching private Go modules from GitHub-hosted repositories."
      scope: both
      optional: true
      audience: "https://api.github.com"
      redemption:
        kind: env-var
        env-name: GITHUB_TOKEN
      discovery:
        env-aliases: [GITHUB_TOKEN, GOPROXY_TOKEN]
