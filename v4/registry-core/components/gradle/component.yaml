metadata:
  name: gradle
  version: "8.14"
  description: "Gradle build tool via SDKMAN"
  license: Apache-2.0
  homepage: "https://gradle.org"
  tags:
    - build-tool
    - java

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  sdkman:
    candidate: "gradle"
    version: "8.14"

depends_on:
  - "script:sdkman"
