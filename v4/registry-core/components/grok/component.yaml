metadata:
  name: grok
  version: "1.1.5"
  description: "Open-source AI coding agent powered by Grok"
  license: MIT
  homepage: "https://github.com/superagent-ai/grok-cli"
  tags:
    - ai
    - cli
    - grok

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "grok-dev"
    global: true

depends_on:
  - "mise:nodejs"

auth:
  tokens:
    - name: xai_api_key
      description: "xAI API key used by the Grok CLI."
      scope: runtime
      optional: false
      audience: "urn:xai:api"
      redemption:
        kind: env-var
        env-name: XAI_API_KEY
