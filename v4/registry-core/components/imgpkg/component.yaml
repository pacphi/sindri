metadata:
  name: imgpkg
  version: "0.47.2"
  description: "Carvel imgpkg bundle tool"
  license: Apache-2.0
  homepage: "https://carvel.dev/imgpkg"
  tags:
    - k8s
    - carvel

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/carvel-dev/imgpkg/releases/download/v{version}/imgpkg-{os}-{arch}"
    install_path: "~/.local/bin/imgpkg"
    checksums:
      linux-x86_64: "sha256:c8f0da1ee06a806a0480f874366d4dac1b35fffd64da6ff55e26ea01144e2f9c"
      linux-aarch64: "sha256:bcc4766eb2e457d8b1d28e74c2b0a2c2f7e958f43c65ab492dc72fcd5b1d4147"
      macos-x86_64: "sha256:340fbd0b3a62d1db9150bab05b6718265e44f40b3fe813fd6b514cf5b8b8a0a2"
      macos-aarch64: "sha256:39e0f1ebdb9c66ee3beac38216e6fe472c7061e5851b103155bcddb51e123065"

depends_on: []
