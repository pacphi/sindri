metadata:
  name: jira-mcp
  version: 1.0.0
  description: Atlassian Jira MCP server
  license: MIT
  homepage: https://www.atlassian.com/software/jira
  tags:
  - mcp
  - jira
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
  arch: x86_64
- os: macos
  arch: aarch64
install: {}
depends_on:
- npm:claude-code
auth:
  tokens:
  - name: jira-api-token
    description: Atlassian API token for the Jira MCP server.
    audience: https://api.atlassian.com
    scope: runtime
    optional: false
    redemption:
      kind: env-var
      env-name: JIRA_API_TOKEN
  - name: jira-base-url
    description: Per-tenant Jira base URL, e.g. https://<tenant>.atlassian.net.
    audience: https://api.atlassian.com
    scope: runtime
    optional: false
    redemption:
      kind: env-var
      env-name: JIRA_BASE_URL
capabilities:
  hooks:
    install:
      sh: scripts/install.sh
    validate:
      sh: scripts/validate.sh
    upgrade:
      sh: scripts/upgrade.sh
    uninstall:
      sh: scripts/uninstall.sh
