metadata:
  name: jira-mcp
  version: "1.0.0"
  description: "Atlassian Jira MCP server"
  license: MIT
  homepage: "https://www.atlassian.com/software/jira"
  tags:
    - mcp
    - jira

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "npm:claude-code"
