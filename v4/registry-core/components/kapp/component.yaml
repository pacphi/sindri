metadata:
  name: kapp
  version: "0.65.1"
  description: "Carvel kapp deployment tool"
  license: Apache-2.0
  homepage: "https://carvel.dev/kapp"
  tags:
    - k8s
    - carvel

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/carvel-dev/kapp/releases/download/v{version}/kapp-{os}-{arch}"
    install_path: "~/.local/bin/kapp"
    checksums:
      linux-x86_64: "sha256:057d7fe33dd6afeb452a888d37995f789b9de0778ce4908896e37d37c52e6ead"
      linux-aarch64: "sha256:1d92b138d8cf93ae627a3b9dbb1f31fc3d6d6298304f90fdbc122acf3b84c13a"
      macos-x86_64: "sha256:50f60126a3ab91b220ecf9f81b4da05a68231ad6fc5e944a1448bafab3d70774"
      macos-aarch64: "sha256:05be91c13b02646ed31b053720cbe27b840b10c62fa7a565fbfe817ce45ed97f"

depends_on: []
