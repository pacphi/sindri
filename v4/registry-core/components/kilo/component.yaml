metadata:
  name: kilo
  version: "1.0.0"
  description: "Kilo AI CLI"
  license: MIT
  homepage: "https://github.com/Kilo-Org/kilocode"
  tags:
    - ai

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@kilo/cli"
    global: true

depends_on:
  - "mise:nodejs"
