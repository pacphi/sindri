metadata:
  name: kotlin
  version: "2.1.20"
  description: "Kotlin language compiler via SDKMAN"
  license: Apache-2.0
  homepage: "https://kotlinlang.org"
  tags:
    - language
    - kotlin
    - jvm

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  sdkman:
    candidate: "kotlin"
    version: "2.1.20"

depends_on:
  - "script:sdkman"
