metadata:
  name: kubectx
  version: "0.10.2"
  description: "Kubernetes context switcher"
  license: Apache-2.0
  homepage: "https://github.com/ahmetb/kubectx"
  tags:
    - k8s

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  binary:
    url_template: "https://github.com/ahmetb/kubectx/releases/download/v{version}/kubectx_v{version}_{os}_{arch}.tar.gz"
    install_path: "~/.local/bin/kubectx"
    checksums:
      linux-x86_64: "sha256:91ac5ef510763cfa78953bd377c90c68cb1f8c30eb2a5ec46196cc72e8c0aa09"
      linux-aarch64: "sha256:2d2fc0a2f34908f8f34ed6db5d83ad8b221d493836671d07cac27003168d34ce"
      macos-x86_64: "sha256:cfac514b91e304755868773fd25b717260651ff9e4fb3ee580235bf8030b2396"
      macos-aarch64: "sha256:124bb71537231078fb488499d3f91adef71199f383ad65328e98f3072e41d66c"

depends_on: []
