metadata:
  name: kubens
  version: "0.10.2"
  description: "Kubernetes namespace switcher"
  license: Apache-2.0
  homepage: "https://github.com/ahmetb/kubectx"
  tags:
    - k8s

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
