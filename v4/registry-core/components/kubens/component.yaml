    install_path: "~/.local/bin/kubens"
    checksums:
      linux-x86_64: "sha256:1cc96c6a6b1f7fb0b36964b92e5953d1f79b0bcbe6e998a800ce84ed82fe9aca"
      linux-aarch64: "sha256:908b1f974f7dc13e6745276dde52ae2e9216d8d014d4621774407d557a12bb09"
      macos-x86_64: "sha256:d3f82bc9105412e696791434934ea994fc4b93b94463a9b918376bcd60bdb822"
      macos-aarch64: "sha256:fcbdc2b984aa44bb6611cc4620a2fffbe2e38bc98883b2e74987d41d719cb233"

depends_on: []
