metadata:
  name: linear-mcp
  version: "1.0.0"
  description: "Linear MCP server"
  license: MIT
  homepage: "https://linear.app"
  tags:
    - mcp
    - linear

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "npm:claude-code"

# ADR-026: auth-aware components (Phase 3 P1).
# Linear MCP authenticates against the Linear GraphQL API with a personal API
# key; required for any tool invocation.
auth:
  tokens:
    - name: linear-api-key
      description: "Linear personal API key used by the Linear MCP server."
      audience: "https://api.linear.app"
      scope: runtime
      optional: false
      redemption:
        kind: env-var
        env-name: LINEAR_API_KEY
