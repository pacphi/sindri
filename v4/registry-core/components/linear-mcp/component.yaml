metadata:
  name: linear-mcp
  version: 1.0.0
  description: Linear MCP server
  license: MIT
  homepage: https://linear.app
  tags:
  - mcp
  - linear
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
  arch: x86_64
- os: macos
  arch: aarch64
install: {}
depends_on:
- npm:claude-code
auth:
  tokens:
  - name: linear-api-key
    description: Linear personal API key used by the Linear MCP server.
    audience: https://api.linear.app
    scope: runtime
    optional: false
    redemption:
      kind: env-var
      env-name: LINEAR_API_KEY
capabilities:
  hooks:
    install:
      sh: scripts/install.sh
    validate:
      sh: scripts/validate.sh
    upgrade:
      sh: scripts/upgrade.sh
    uninstall:
      sh: scripts/uninstall.sh
