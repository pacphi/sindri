metadata:
  name: loki-mode
  version: "1.0.0"
  description: "Loki mode — Claude stateful explorer"
  license: MIT
  homepage: "https://github.com/ruvnet/loki-mode"
  tags:
    - ai

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "loki-mode"
    global: true

depends_on:
  - "mise:nodejs"
