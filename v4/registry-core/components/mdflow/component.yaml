metadata:
  name: mdflow
  version: "1.0.0"
  description: "mdflow markdown workflow CLI"
  license: MIT
  homepage: "https://github.com/ruvnet/mdflow"
  tags:
    - docs

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@mdflow/cli"
    global: true

depends_on:
  - "mise:nodejs"
