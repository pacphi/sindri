metadata:
  name: nodejs
  version: "22.0.0"
  description: "Node.js JavaScript runtime via mise"
  license: MIT
  homepage: "https://nodejs.org"
  tags:
    - runtime
    - javascript

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  mise:
    tools:
      node: "22.0.0"

depends_on: []

auth:
  tokens:
    - name: npm_registry_token
      description: "npm auth token for private registries (npm publish/install from private packages)."
      scope: both
      optional: true
      audience: "https://registry.npmjs.org"
      redemption:
        kind: env-var
        env-name: NPM_TOKEN
      discovery:
        env-aliases: [NPM_TOKEN, NODE_AUTH_TOKEN]
