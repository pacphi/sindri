metadata:
  name: notebooklm-mcp-cli
  version: "1.0.0"
  description: "NotebookLM MCP bridge"
  license: MIT
  homepage: "https://notebooklm.google.com"
  tags:
    - mcp
    - notebooklm

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "mise:python"
