metadata:
  name: ollama
  version: "0.5.0"
  description: "Ollama local LLM runtime"
  license: MIT
  homepage: "https://ollama.com"
  tags:
    - ai
    - llm

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on: []
