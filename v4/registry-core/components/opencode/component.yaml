metadata:
  name: opencode
  version: "1.2.14"
  description: "OpenCode terminal AI coding assistant"
  license: MIT
  homepage: "https://opencode.ai"
  tags:
    - ai
    - coding

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "opencode-ai"
    global: true

depends_on:
  - "mise:nodejs"

auth:
  tokens:
    - name: openai_api_key
      description: "Provider API key used by the OpenCode terminal assistant (OpenAI by default)."
      scope: runtime
      optional: false
      audience: "urn:openai:api"
      redemption:
        env-var:
          env-name: OPENAI_API_KEY
