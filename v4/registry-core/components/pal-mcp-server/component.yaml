metadata:
  name: pal-mcp-server
  version: 1.0.0
  description: PAL MCP server
  license: MIT
  homepage: https://github.com/BeehiveInnovations/pal-mcp-server
  tags:
  - mcp
  - pal
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
  arch: x86_64
- os: macos
  arch: aarch64
install: {}
depends_on:
- mise:python
auth:
  tokens:
  - name: gemini-api-key
    description: Google AI Studio API key used by PAL's Gemini provider.
    audience: https://generativelanguage.googleapis.com
    scope: runtime
    optional: false
    redemption:
      kind: env-var
      env-name: GEMINI_API_KEY
  - name: openai-api-key
    description: OpenAI API key used by PAL's OpenAI provider (alternate).
    audience: https://api.openai.com
    scope: runtime
    optional: true
    redemption:
      kind: env-var
      env-name: OPENAI_API_KEY
  - name: openrouter-api-key
    description: OpenRouter API key used by PAL's OpenRouter provider (alternate).
    audience: https://openrouter.ai/api
    scope: runtime
    optional: true
    redemption:
      kind: env-var
      env-name: OPENROUTER_API_KEY
capabilities:
  hooks:
    install:
      sh: scripts/install.sh
    validate:
      sh: scripts/validate.sh
    upgrade:
      sh: scripts/upgrade.sh
    uninstall:
      sh: scripts/uninstall.sh
