metadata:
  name: paperclip
  version: "1.0.0"
  description: "paperclip — context bundler"
  license: MIT
  homepage: "https://github.com/ruvnet/paperclip"
  tags:
    - ai

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@paperclip/cli"
    global: true

depends_on:
  - "mise:nodejs"
