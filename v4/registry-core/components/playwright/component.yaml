metadata:
  name: playwright
  version: "1.48.0"
  description: "Playwright browsers + system deps"
  license: Apache-2.0
  homepage: "https://playwright.dev"
  tags:
    - browser
    - testing

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "mise:nodejs"
