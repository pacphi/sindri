  version: 3.231.0
  description: Pulumi IaC
  license: Apache-2.0
  homepage: https://pulumi.com
  tags:
  - iac
  - pulumi
platforms:
- os: linux
  arch: x86_64
- os: linux
  arch: aarch64
- os: macos
