metadata:
  name: python
  version: "3.12.0"
  description: "Python language runtime via mise"
  license: PSF-2.0
  homepage: "https://python.org"
  tags:
    - runtime
    - python

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  mise:
    tools:
      python: "3.12.0"

depends_on: []

auth:
  tokens:
    - name: pypi_registry_token
      description: "PyPI API token for publishing or installing from private indexes."
      scope: both
      optional: true
      audience: "https://pypi.org"
      redemption:
        kind: env-var
        env-name: PYPI_TOKEN
      discovery:
        env-aliases: [PYPI_TOKEN, TWINE_PASSWORD, POETRY_PYPI_TOKEN_PYPI]
