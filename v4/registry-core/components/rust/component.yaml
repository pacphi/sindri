metadata:
  name: rust
  version: "1.83.0"
  description: "Rust toolchain via mise"
  license: Apache-2.0
  homepage: "https://rust-lang.org"
  tags:
    - language
    - rust

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  mise:
    tools:
      rust: "1.83.0"

depends_on: []

auth:
  tokens:
    - name: crates_io_token
      description: "crates.io API token for `cargo publish` and authenticated registry access."
      scope: both
      optional: true
      audience: "https://crates.io"
      redemption:
        kind: env-var
        env-name: CARGO_REGISTRY_TOKEN
      discovery:
        env-aliases: [CARGO_REGISTRY_TOKEN]
