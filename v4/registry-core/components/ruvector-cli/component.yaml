metadata:
  name: ruvector-cli
  version: "0.1.0"
  description: "RuVector CLI (vector DB)"
  license: MIT
  homepage: "https://github.com/ruvnet/ruvector"
  tags:
    - vector-db

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  cargo:
    crate: "ruvector-cli"
    version: "0.1.0"

depends_on:
  - "mise:rust"
