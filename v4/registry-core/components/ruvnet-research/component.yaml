metadata:
  name: ruvnet-research
  version: "1.0.0"
  description: "Research assistant CLI (Perplexity-backed)"
  license: MIT
  homepage: "https://github.com/ruvnet/ruvnet-research"
  tags:
    - ai
    - research

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  npm:
    package: "@ruvnet/research"
    global: true

depends_on:
  - "mise:nodejs"
