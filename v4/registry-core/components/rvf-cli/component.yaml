metadata:
  name: rvf-cli
  version: "0.1.0"
  description: "RVF CLI"
  license: MIT
  homepage: "https://github.com/ruvnet/rvf-cli"
  tags:
    - tools

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  cargo:
    crate: "rvf-cli"
    version: "0.1.0"

depends_on:
  - "mise:rust"
