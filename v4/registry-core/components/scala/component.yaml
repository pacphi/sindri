metadata:
  name: scala
  version: "3.7.0"
  description: "Scala language compiler via SDKMAN"
  license: Apache-2.0
  homepage: "https://scala-lang.org"
  tags:
    - language
    - scala
    - jvm

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  sdkman:
    candidate: "scala"
    version: "3.7.0"

depends_on:
  - "script:sdkman"
