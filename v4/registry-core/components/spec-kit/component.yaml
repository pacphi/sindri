metadata:
  name: spec-kit
  version: "1.0.0"
  description: "GitHub Spec Kit — spec-driven development"
  license: MIT
  homepage: "https://github.com/sindri-dev/spec-kit"
  tags:
    - spec
    - tools

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "mise:python"
