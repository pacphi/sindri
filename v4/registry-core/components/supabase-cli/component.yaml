metadata:
  name: supabase-cli
  version: "1.200.0"
  description: "Supabase CLI (docker-backed local dev)"
  license: Apache-2.0
  homepage: "https://supabase.com"
  tags:
    - database
    - supabase

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on:
  - "script:docker"

auth:
  tokens:
    - name: supabase_access_token
      description: "Supabase personal access token for the Management API (`supabase login --token`)."
      scope: runtime
      optional: true
      audience: "https://api.supabase.com"
      redemption:
        kind: env-var
        env-name: SUPABASE_ACCESS_TOKEN
      discovery:
        env-aliases: [SUPABASE_ACCESS_TOKEN]
