metadata:
  name: tmux-workspace
  version: "1.0.0"
  description: "tmux workspace layouts + key bindings"
  license: MIT
  homepage: "https://github.com/sindri-dev/tmux-workspace"
  tags:
    - terminal
    - tmux

platforms:
  - os: linux
    arch: x86_64
  - os: linux
    arch: aarch64
  - os: macos
    arch: x86_64
  - os: macos
    arch: aarch64

install:
  script:
    install: "install.sh"
    timeout: "600"

depends_on: []
